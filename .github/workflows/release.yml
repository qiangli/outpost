# Triggered by pushing a vX.Y.Z tag. Builds outpost for the platforms
# we ship (darwin + linux × arm64 + amd64 + windows × amd64 + arm64),
# sha256s each artifact, uploads them to a GitHub Release, and POSTs a
# release-manifest webhook to cloudbox so the SPA's Hosts page can flag
# "update available" without polling.
#
# Secrets required:
#   CLOUDBOX_RELEASE_WEBHOOK_URL    — https://ai.dhnt.io/api/webhooks/outpost-release
#   CLOUDBOX_RELEASE_WEBHOOK_SECRET — shared HMAC secret (also set in cloudbox env)
#
# To cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Post-release manual step (Windows SmartScreen / Defender reputation):
# until outpost ships with a code-signing cert, Windows users may see
# Defender / SmartScreen warnings on first run. Submit each Windows
# release binary (outpost-vX.Y.Z-windows-amd64.exe + .arm64.exe) at
# https://submit.microsoft.com as a false positive. Repeated good-faith
# submissions build publisher reputation and reduce the warning rate
# over time. Tracked in docs/install.md ("Windows Defender" section).

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # for actions/create-release

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: amd64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so vcs.revision stamps correctly

      - name: Bootstrap sibling deps (../sh)
        run: ./scripts/bootstrap-siblings.sh

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          out="dist/outpost-${RELEASE_TAG}-${GOOS}-${GOARCH}"
          # Windows binaries get the .exe extension so Windows hosts
          # download a file the OS recognizes as executable; the
          # publish step strips .exe when parsing the os/arch from the
          # filename.
          if [ "${GOOS}" = "windows" ]; then
            out="${out}.exe"
          fi
          go build \
            -ldflags "-X github.com/qiangli/outpost/internal/agent.releaseTag=${RELEASE_TAG}" \
            -trimpath \
            -o "${out}" \
            ./cmd/outpost
          # Sanity-check the binary self-reports the right tag. For
          # cross-arch builds we can only check on a native runner;
          # the linux/amd64 case is one such pairing.
          if [ "${GOOS}/${GOARCH}" = "linux/amd64" ]; then
            "${out}" version --json
          fi

      - name: sha256
        run: |
          cd dist
          shasum -a 256 outpost-* > outpost-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.sha256
          cat outpost-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: outpost-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/outpost-*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: publish release + webhook
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist/

      - name: extract release notes from annotated tag
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Read the tag's annotation body from the GitHub API rather
          # than the runner's local git state. `actions/checkout` on a
          # tag-triggered run does NOT preserve the annotated-tag
          # object — it points refs/tags/<TAG> directly at the commit,
          # so `git tag -l --format='%(contents)'` falls through to
          # the commit message and we lose the release notes.
          #
          # Going through `gh api`:
          #   1. /git/ref/tags/<TAG>  → resolves the ref, tells us
          #      whether it points at a tag-object (annotated) or a
          #      commit (lightweight).
          #   2. /git/tags/<sha>      → returns the tag object's
          #      `message` field, which is the annotation body we
          #      wrote via `git tag -a -F …`.
          # Lightweight tags carry no annotation — fall back to the
          # generic line so gh release create always has something.
          obj=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object')
          obj_type=$(echo "$obj" | jq -r '.type')
          body=""
          if [ "$obj_type" = "tag" ]; then
            obj_sha=$(echo "$obj" | jq -r '.sha')
            body=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${obj_sha}" --jq '.message')
          fi
          if [ -z "$(echo "$body" | tr -d '[:space:]')" ]; then
            body="Automated release for ${TAG}."
          fi
          # Persist to a file; --notes on the command line would
          # require shell-quoting every newline + backtick. Reading
          # from a file is safer for arbitrary markdown bodies.
          printf '%s\n' "$body" > /tmp/release-notes.md
          echo "Wrote $(wc -l < /tmp/release-notes.md) lines from a ${obj_type} tag object"
          head -5 /tmp/release-notes.md

      - name: create github release
        id: gh_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file /tmp/release-notes.md \
            dist/outpost-*
          # Capture the per-asset download URLs for the webhook payload.
          # GitHub formats them deterministically:
          #   https://github.com/<owner>/<repo>/releases/download/<tag>/<filename>
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          echo "base=${base}" >> "$GITHUB_OUTPUT"

      - name: build webhook payload
        id: payload
        env:
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          BASE: ${{ steps.gh_release.outputs.base }}
        run: |
          # Compose one entry per platform with the asset URL + the
          # sha256 hex (extracted from the .sha256 sidecar file).
          artifacts="{}"
          for f in dist/outpost-${TAG}-*; do
            name=$(basename "$f")
            # skip the sha256 sidecar files themselves
            case "$name" in
              *.sha256) continue ;;
            esac
            # name format: outpost-<TAG>-<OS>-<ARCH>[.exe]
            platform=${name#outpost-${TAG}-}
            platform=${platform%.exe}
            os=${platform%-*}
            arch=${platform##*-}
            sha=$(shasum -a 256 "$f" | awk '{print $1}')
            key="${os}_${arch}"
            artifacts=$(jq -n \
              --argjson cur "$artifacts" \
              --arg key "$key" \
              --arg url "${BASE}/${name}" \
              --arg sha "$sha" \
              '$cur + {($key): {url: $url, sha256: $sha}}')
          done
          payload=$(jq -n \
            --arg tag "$TAG" \
            --arg commit "$COMMIT" \
            --argjson artifacts "$artifacts" \
            '{tag: $tag, commit: $commit, artifacts: $artifacts}')
          echo "$payload" | jq .
          echo "$payload" > payload.json
          echo "path=payload.json" >> "$GITHUB_OUTPUT"

      - name: post to cloudbox
        env:
          URL: ${{ secrets.CLOUDBOX_RELEASE_WEBHOOK_URL }}
          SECRET: ${{ secrets.CLOUDBOX_RELEASE_WEBHOOK_SECRET }}
          PAYLOAD: ${{ steps.payload.outputs.path }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::warning::CLOUDBOX_RELEASE_WEBHOOK_URL / _SECRET not set; skipping webhook"
            exit 0
          fi
          # HMAC-SHA256 the raw payload bytes; send as
          # X-Outpost-Release-Sig: sha256=<hex>.
          sig=$(openssl dgst -sha256 -hmac "$SECRET" "$PAYLOAD" | awk '{print $2}')
          curl -fsS -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Outpost-Release-Sig: sha256=${sig}" \
            --data-binary "@${PAYLOAD}"
          echo "webhook delivered"
