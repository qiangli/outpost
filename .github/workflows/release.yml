# Triggered by pushing a vX.Y.Z tag. Builds outpost for the platforms
# we ship (darwin + linux × arm64 + amd64 + windows × amd64 + arm64),
# sha256s each artifact, uploads them to a GitHub Release, and POSTs a
# release-manifest webhook to cloudbox so the SPA's Hosts page can flag
# "update available" without polling.
#
# Secrets required:
#   CLOUDBOX_RELEASE_WEBHOOK_URL    — https://ai.dhnt.io/api/webhooks/outpost-release
#   CLOUDBOX_RELEASE_WEBHOOK_SECRET — shared HMAC secret (also set in cloudbox env)
#
# To cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Post-release manual step (Windows SmartScreen / Defender reputation):
# until outpost ships with a code-signing cert, Windows users may see
# Defender / SmartScreen warnings on first run. Submit each Windows
# release binary (outpost-vX.Y.Z-windows-amd64.exe + .arm64.exe) at
# https://submit.microsoft.com as a false positive. Repeated good-faith
# submissions build publisher reputation and reduce the warning rate
# over time. Tracked in docs/install.md ("Windows Defender" section).

name: release

on:
  push:
    tags:
      # Build + publish a PRE-RELEASE only for -dev tags. A bare vX.Y.Z tag is a
      # PROMOTION of already-tested bytes (see .github/workflows/promote.yml) and
      # must NOT rebuild from source — prod ships exactly what QA tested, byte for
      # byte. So the promotion tag is deliberately excluded from this trigger.
      - 'v*-dev'
  workflow_dispatch: {} # manual escape hatch: build the checked-out ref on demand

permissions:
  contents: write # for actions/create-release

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: amd64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so vcs.revision stamps correctly

      - name: Bootstrap sibling deps (../sh)
        run: ./scripts/bootstrap-siblings.sh

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # Stamp + name the binary with the BASE version (strip any pre-release
          # suffix, e.g. v1.2.3-dev -> v1.2.3). So a `-dev` PRE-RELEASE and the
          # final release are BYTE-IDENTICAL: prod promotes the tested bytes by
          # re-publishing the same assets under the final tag, no rebuild. The
          # `-dev` lives only in the git tag / release name, never in the binary.
          BASE="${RELEASE_TAG%%-*}"
          out="dist/outpost-${BASE}-${GOOS}-${GOARCH}"
          # Windows binaries get the .exe extension so Windows hosts
          # download a file the OS recognizes as executable; the
          # publish step strips .exe when parsing the os/arch from the
          # filename.
          if [ "${GOOS}" = "windows" ]; then
            out="${out}.exe"
          fi
          go build \
            -ldflags "-X github.com/qiangli/outpost/internal/agent.releaseTag=${BASE}" \
            -trimpath \
            -o "${out}" \
            ./cmd/outpost
          # NOTE: the cross-compiled binary is NOT executed here (this is
          # an amd64 runner). Every platform's binary is boot-smoked on a
          # native runner in the `smoke` job below, which gates `publish`.

      - name: sha256
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cd dist
          BASE="${RELEASE_TAG%%-*}"
          f="outpost-${BASE}-${{ matrix.os }}-${{ matrix.arch }}.sha256"
          shasum -a 256 outpost-* > "$f"
          cat "$f"

      - uses: actions/upload-artifact@v7
        with:
          name: outpost-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/outpost-*
          retention-days: 1
          if-no-files-found: error

  smoke:
    # Boot-smoke EVERY published binary on a NATIVE runner before the
    # release is allowed to publish. The build job cross-compiles on
    # amd64 Linux, so without this the darwin/windows/arm artifacts ship
    # having never been executed — a build-tag regression, a
    # platform-specific nil-deref (e.g. the Windows vpty path), or a bad
    # cross-link would reach the fleet undetected. This job downloads the
    # exact artifact and runs it, so `publish` (and therefore the
    # canary→fleet rollout) can only proceed if every platform boots.
    name: smoke ${{ matrix.os }}/${{ matrix.arch }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-latest      # Apple Silicon
          # NOTE: darwin/amd64 is deliberately NOT native-smoked. GitHub's
          # macos-13 (Intel) runners are being deprecated and queue
          # indefinitely (a v0.9.0 release hung 1h+ waiting for one),
          # which would block `publish` — and the whole canary→fleet
          # rollout — on a platform that has ZERO hosts in the fleet. The
          # binary still builds + publishes; the build job already proves
          # it compiles. Re-add a darwin/amd64 smoke (macos-latest +
          # Rosetta, or a real Intel runner) if amd64 Macs ever join.
          - os: windows
            arch: amd64
            runner: windows-latest
          - os: windows
            arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: outpost-${{ matrix.os }}-${{ matrix.arch }}
          path: dist

      - name: boot smoke
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          base="${tag%%-*}"   # binary is stamped with the base version, even for a -dev pre-release
          bin="dist/outpost-${base}-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            bin="${bin}.exe"
          fi
          chmod +x "$bin" 2>/dev/null || true
          echo "== version --json (boots + self-reports the base version) =="
          out=$("$bin" version --json)
          echo "$out"
          echo "$out" | grep -q "$base" || { echo "::error::version did not report $base"; exit 1; }
          echo "== --help (initializes the full cobra command tree) =="
          "$bin" --help >/dev/null
          echo "== docs settings (reads the embedded FS) =="
          "$bin" docs settings >/dev/null
          echo "boot smoke OK: ${{ matrix.os }}/${{ matrix.arch }}"

  publish:
    name: publish release + webhook
    needs: [build, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist/

      - name: extract release notes from annotated tag
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Read the tag's annotation body from the GitHub API rather
          # than the runner's local git state. `actions/checkout` on a
          # tag-triggered run does NOT preserve the annotated-tag
          # object — it points refs/tags/<TAG> directly at the commit,
          # so `git tag -l --format='%(contents)'` falls through to
          # the commit message and we lose the release notes.
          #
          # Going through `gh api`:
          #   1. /git/ref/tags/<TAG>  → resolves the ref, tells us
          #      whether it points at a tag-object (annotated) or a
          #      commit (lightweight).
          #   2. /git/tags/<sha>      → returns the tag object's
          #      `message` field, which is the annotation body we
          #      wrote via `git tag -a -F …`.
          # Lightweight tags carry no annotation — fall back to the
          # generic line so gh release create always has something.
          obj=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object')
          obj_type=$(echo "$obj" | jq -r '.type')
          body=""
          if [ "$obj_type" = "tag" ]; then
            obj_sha=$(echo "$obj" | jq -r '.sha')
            body=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${obj_sha}" --jq '.message')
          fi
          if [ -z "$(echo "$body" | tr -d '[:space:]')" ]; then
            body="Automated release for ${TAG}."
          fi
          # Persist to a file; --notes on the command line would
          # require shell-quoting every newline + backtick. Reading
          # from a file is safer for arbitrary markdown bodies.
          printf '%s\n' "$body" > /tmp/release-notes.md
          echo "Wrote $(wc -l < /tmp/release-notes.md) lines from a ${obj_type} tag object"
          head -5 /tmp/release-notes.md

      - name: create github release
        id: gh_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # A pre-release tag (v1.2.3-dev) publishes as a GitHub PRE-RELEASE, which
          # `/releases/latest` (the installer) skips — so users never download the
          # untested build. QA downloads it by explicit tag; prod later promotes
          # the same assets to the final release.
          pre=""
          [ "${TAG}" != "${TAG%%-*}" ] && pre="--prerelease"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file /tmp/release-notes.md \
            $pre \
            dist/outpost-*
          # Capture the per-asset download URLs for the webhook payload.
          # GitHub formats them deterministically:
          #   https://github.com/<owner>/<repo>/releases/download/<tag>/<filename>
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          echo "base=${base}" >> "$GITHUB_OUTPUT"

      # NOTE: this workflow now builds ONLY -dev pre-releases, so it never notifies
      # the fleet. The fleet-notify webhook (and the official --latest release) live
      # in .github/workflows/promote.yml, which byte-promotes these tested assets
      # after the per-OS QA gates are green. Keeping the webhook out of here is what
      # guarantees the fleet only ever sees bytes that passed QA.
