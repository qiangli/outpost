# Canary-then-fan-out for outpost releases.
#
# Fires automatically after `release.yml` succeeds on a tag push, OR can
# be triggered manually via workflow_dispatch.
#
# Behavior:
#   1. Resolve the artifact URL + sha256 for the canary host's platform
#      from the published GitHub Release (release.yml uploads both the
#      binary and a .sha256 sidecar per platform).
#   2. POST /api/v1/fleet/upgrade on cloudbox with hosts=[<canary>].
#   3. The canary host's outpost (with update_mode=auto) accepts and
#      applies the envelope: stage → probe → atomic-swap → re-exec.
#      The job fails if cloudbox reports any per-host status other
#      than "ok".
#   4. Poll /api/hosts until the canary host's reported commit matches
#      the envelope (cloudbox's host-poller refreshes within ~5 s of
#      the daemon re-execing; convergence usually 10-20 s). Abort if
#      it doesn't converge in 2 minutes — a stuck canary is the
#      exact "stop before it hits the whole fleet" case rollout.yml
#      is designed to catch.
#   5. Re-POST the same envelope WITHOUT the hosts filter; cloudbox
#      fans out to every paired host. The canary gets a 304 same_commit
#      no-op; other same-platform hosts apply; cross-platform hosts
#      fail at the probe step (envelope is built for one platform).
#      Cross-platform rejections surface as a warning, not failure —
#      operator runs per-platform follow-ups for mixed fleets.
#
# Required repository secrets:
#   CLOUDBOX_BASE_URL              — e.g. https://ai.dhnt.io
#   CLOUDBOX_FLEET_UPGRADE_TOKEN   — operator-minted Bearer with
#                                    fleet:upgrade scope; mint via the
#                                    cloudbox SPA's API Keys page.
#
# Manual canary recipe:
#   gh workflow run rollout.yml --field tag=v0.4.5
#                               --field dry_run=false
#                               --field host=<host>
#                               --field platform=<os>-<arch>

name: rollout

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.5)"
        required: true
      host:
        description: "Canary host name (blank → the CANARY_HOST secret)"
        default: ""
      platform:
        description: "Canary host platform"
        default: "darwin-arm64"
        type: choice
        options:
          - darwin-arm64
          - darwin-amd64
          - linux-arm64
          - linux-amd64
          - windows-amd64
          - windows-arm64
      dry_run:
        description: "Preview the envelope, don't actually push"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  canary:
    # Fire on:
    #   - Manual dispatch
    #   - `release` workflow finishing successfully on a tag push (the
    #     workflow_run.event = "push" is set even for tag pushes; the
    #     fact that release.yml only triggers on `v*` tags means
    #     workflow_run firings of it correspond to releases).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve parameters
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            host="${{ inputs.host }}"
            platform="${{ inputs.platform }}"
            dry_run="${{ inputs.dry_run }}"
          else
            # workflow_run: derive tag from source workflow. GitHub sets
            # head_branch to the tag ref for tag-triggered workflows.
            tag="${{ github.event.workflow_run.head_branch }}"
            host="${{ secrets.CANARY_HOST }}"
            platform="darwin-arm64"
            dry_run="false"
          fi
          # The canary host comes from the CANARY_HOST secret (kept out of the
          # public repo); a manual dispatch may override it via inputs.host.
          [ -z "$host" ] && host="${{ secrets.CANARY_HOST }}"
          if [ -z "$tag" ]; then
            echo "::error::could not resolve release tag"
            exit 1
          fi
          if [ -z "$host" ]; then
            echo "::error::canary host unset — set the CANARY_HOST repo secret to a cloudbox-paired host"
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "host=$host"
            echo "platform=$platform"
            echo "dry_run=$dry_run"
          } >> "$GITHUB_OUTPUT"
          echo "→ canary tag=$tag host=$host platform=$platform dry_run=$dry_run"

      - name: Build canary envelope
        id: envelope
        run: |
          tag="${{ steps.cfg.outputs.tag }}"
          platform="${{ steps.cfg.outputs.platform }}"
          host="${{ steps.cfg.outputs.host }}"
          asset="outpost-${tag}-${platform}"
          # Windows artifact filename has .exe; the .sha256 sidecar uses
          # the same base name + .sha256 regardless.
          case "$platform" in
            windows-*) bin_asset="${asset}.exe" ;;
            *) bin_asset="$asset" ;;
          esac
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          url="${base}/${bin_asset}"
          # .sha256 sidecar format (from release.yml): one line of
          # "<hex>  <filename>". Awk the first field.
          sha=$(curl -fsSL "${base}/${asset}.sha256" | awk '{print $1}')
          if [ -z "$sha" ]; then
            echo "::error::could not fetch sha256 sidecar at ${base}/${asset}.sha256"
            exit 1
          fi
          # Resolve the tag's commit for the envelope's `commit` field.
          # The outpost worker probes the staged binary via
          # `<candidate> version --json` and refuses to apply if its
          # self-reported commit doesn't match.
          #
          # NOTE: For annotated tags (created with `git tag -a`), the
          # /git/refs/tags/<tag> endpoint returns the tag OBJECT's SHA,
          # not the commit's SHA — the binary's probe would then never
          # match. /commits/<ref> auto-dereferences annotated tags to
          # the underlying commit SHA, which is what the binary's
          # ldflags-stamped version reports.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            commit=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${tag}" --jq .sha)
          else
            commit="${{ github.event.workflow_run.head_sha }}"
          fi
          envelope=$(jq -n \
            --arg release_id "$tag" \
            --arg url "$url" \
            --arg sha256 "$sha" \
            --arg commit "$commit" \
            --arg host "$host" \
            '{release_id: $release_id, url: $url, sha256: $sha256, commit: $commit, hosts: [$host]}')
          echo "$envelope" | jq .
          {
            echo 'json<<ENV_END'
            echo "$envelope"
            echo 'ENV_END'
            echo "commit=$commit"
          } >> "$GITHUB_OUTPUT"

      - name: Preview envelope (dry run)
        if: steps.cfg.outputs.dry_run == 'true'
        env:
          CLOUDBOX_BASE_URL: ${{ secrets.CLOUDBOX_BASE_URL }}
        run: |
          echo "DRY RUN — would POST to ${CLOUDBOX_BASE_URL:-<unset>}/api/v1/fleet/upgrade:"
          echo '${{ steps.envelope.outputs.json }}' | jq .

      - name: Push canary envelope
        if: steps.cfg.outputs.dry_run != 'true'
        env:
          CLOUDBOX_BASE_URL: ${{ secrets.CLOUDBOX_BASE_URL }}
          CLOUDBOX_FLEET_UPGRADE_TOKEN: ${{ secrets.CLOUDBOX_FLEET_UPGRADE_TOKEN }}
        run: |
          if [ -z "$CLOUDBOX_BASE_URL" ] || [ -z "$CLOUDBOX_FLEET_UPGRADE_TOKEN" ]; then
            echo "::error::CLOUDBOX_BASE_URL or CLOUDBOX_FLEET_UPGRADE_TOKEN not set on this repo"
            exit 1
          fi
          host="${{ steps.cfg.outputs.host }}"
          # POST the envelope; capture the aggregate response. The
          # cloudbox handler dispatches synchronously per-host and
          # returns one result row per target.
          resp=$(curl -fsS -X POST \
            -H "Authorization: Bearer $CLOUDBOX_FLEET_UPGRADE_TOKEN" \
            -H "Content-Type: application/json" \
            "${CLOUDBOX_BASE_URL}/api/v1/fleet/upgrade" \
            --data-binary '${{ steps.envelope.outputs.json }}')
          echo "$resp" | jq .
          status=$(echo "$resp" | jq -r ".results[] | select(.host == \"$host\") | .status")
          if [ "$status" != "ok" ]; then
            echo "::error::canary host '$host' upgrade status: ${status:-<missing>}"
            echo "$resp" | jq ".results[] | select(.host == \"$host\")"
            exit 1
          fi
          echo "✓ canary upgrade succeeded on host: $host"

      - name: Wait for canary host to converge
        if: steps.cfg.outputs.dry_run != 'true'
        env:
          CLOUDBOX_BASE_URL: ${{ secrets.CLOUDBOX_BASE_URL }}
          CLOUDBOX_FLEET_UPGRADE_TOKEN: ${{ secrets.CLOUDBOX_FLEET_UPGRADE_TOKEN }}
        run: |
          # Poll cloudbox's /api/hosts until the canary host's reported
          # commit matches the envelope's commit. The host-poller in
          # cloudbox refreshes the cached `commit` field within ~5 s of
          # the outpost daemon re-execing post-swap, so this typically
          # converges in 10-20 s. Cap at 2 minutes; if the canary
          # host doesn't converge, abort before fanning out — a stuck
          # canary is the exact "stop before it hits the whole fleet"
          # case rollout.yml is designed to catch.
          host="${{ steps.cfg.outputs.host }}"
          target="${{ steps.envelope.outputs.commit }}"
          target_short="${target:0:12}"
          for i in $(seq 1 24); do
            sleep 5
            live=$(curl -fsS \
              -H "Authorization: Bearer $CLOUDBOX_FLEET_UPGRADE_TOKEN" \
              "${CLOUDBOX_BASE_URL}/api/hosts" \
              | jq -r ".hosts[] | select(.name == \"$host\") | .commit")
            live_short="${live:0:12}"
            if [ "$live_short" = "$target_short" ]; then
              echo "✓ canary host '$host' converged at commit $live_short"
              exit 0
            fi
            echo "  poll $i/24: host=$host live=${live_short:-<none>} expected=$target_short"
          done
          echo "::error::canary host '$host' did not converge to commit $target_short within 2 minutes"
          exit 1

      - name: Health-gate the canary before fan-out
        if: steps.cfg.outputs.dry_run != 'true'
        env:
          CLOUDBOX_BASE_URL: ${{ secrets.CLOUDBOX_BASE_URL }}
          CLOUDBOX_FLEET_UPGRADE_TOKEN: ${{ secrets.CLOUDBOX_FLEET_UPGRADE_TOKEN }}
          # Bake past the outpost auto-rollback watchdog's confirm dwell
          # (default 3m) so a HEALTHY canary has flipped healthy=true by the
          # time we check — and a crash-looping one is still healthy=false.
          BAKE_SECONDS: "240"
        run: |
          # Convergence (above) only proves the canary re-execed onto the new
          # commit; it does NOT prove the new binary is STABLE. Right after
          # the canary upgrade it's the only host on the target commit, so
          # cloudbox's /fleet/health `unhealthy` count is exactly "is the
          # canary crash-looping / unconfirmed". A non-zero count (or a
          # 'fail' verdict) means the new build is bad — abort before it
          # hits the fleet. The endpoint also AUTO-TRIPS the global kill
          # switch on 'fail', so even a dead job can't let a bad wave roll.
          target="${{ steps.envelope.outputs.commit }}"
          echo "baking ${BAKE_SECONDS}s for the canary to confirm (auto-rollback dwell)…"
          sleep "${BAKE_SECONDS}"
          health=$(curl -fsS \
            -H "Authorization: Bearer $CLOUDBOX_FLEET_UPGRADE_TOKEN" \
            "${CLOUDBOX_BASE_URL}/api/v1/fleet/health?commit=${target}")
          echo "$health" | jq .
          verdict=$(echo "$health" | jq -r .verdict)
          unhealthy=$(echo "$health" | jq -r '.unhealthy // 0')
          if [ "$verdict" = "fail" ] || [ "${unhealthy:-0}" -gt 0 ]; then
            echo "::error::canary is unhealthy after bake (verdict=$verdict, unhealthy=$unhealthy) — rollout HALTED. The global kill switch was auto-tripped; clear it with POST /api/v1/fleet/pause {\"paused\":false} once the build is fixed."
            exit 1
          fi
          echo "✓ canary healthy after bake (verdict=$verdict) — proceeding to fan-out"

      - name: Fan-out to remaining fleet
        if: steps.cfg.outputs.dry_run != 'true'
        env:
          CLOUDBOX_BASE_URL: ${{ secrets.CLOUDBOX_BASE_URL }}
          CLOUDBOX_FLEET_UPGRADE_TOKEN: ${{ secrets.CLOUDBOX_FLEET_UPGRADE_TOKEN }}
        run: |
          # Re-POST the same envelope to every paired host EXCEPT the
          # canary. The canary must not be re-targeted: it restarted
          # into the new binary seconds ago, and on a fresh worker the
          # in-memory replay guard is empty — pre-v0.7.1 workers also
          # mis-compared same_commit (version tag vs sha), so the
          # fan-out re-applied on the canary and overwrote its
          # <binary>.previous rollback copy with the new version (seen
          # on host-a during the v0.7.0 rollout). v0.7.1+ workers
          # defend receiver-side too (ledger-seeded replay guard +
          # normalized same_commit), but the envelope shouldn't rely
          # on the receiver being new enough.
          # Hosts of a different platform fail at the worker's probe
          # step (`<candidate> version --json` won't match the
          # envelope's commit because the binary is built for a
          # different arch); those land as non-"ok" per-host results
          # and we surface them as a warning, not a failure — they're
          # the expected outcome for the mixed-platform case, not a
          # bug. The operator runs a per-platform POST follow-up.
          canary="${{ steps.cfg.outputs.host }}"
          others=$(curl -fsS \
            -H "Authorization: Bearer $CLOUDBOX_FLEET_UPGRADE_TOKEN" \
            "${CLOUDBOX_BASE_URL}/api/hosts" \
            | jq --arg canary "$canary" '[.hosts[].name | select(. != $canary)]')
          if [ "$(echo "$others" | jq 'length')" -eq 0 ]; then
            echo "canary '$canary' is the entire fleet — nothing to fan out to"
            exit 0
          fi
          envelope_fanout=$(echo '${{ steps.envelope.outputs.json }}' \
            | jq --argjson hosts "$others" '.hosts = $hosts')
          echo "fan-out envelope (canary '$canary' excluded):"
          echo "$envelope_fanout" | jq .
          resp=$(curl -fsS -X POST \
            -H "Authorization: Bearer $CLOUDBOX_FLEET_UPGRADE_TOKEN" \
            -H "Content-Type: application/json" \
            "${CLOUDBOX_BASE_URL}/api/v1/fleet/upgrade" \
            --data-binary "$envelope_fanout")
          echo "$resp" | jq .
          # If the global kill switch is on (e.g. an earlier wave auto-
          # tripped it), cloudbox returns a single "paused" result and
          # dispatches nothing — treat that as a halt, not a success.
          if echo "$resp" | jq -e '.results[]? | select(.status == "paused")' >/dev/null; then
            echo "::error::fleet upgrades are PAUSED (kill switch) — fan-out skipped. Clear with POST /api/v1/fleet/pause {\"paused\":false}."
            exit 1
          fi
          ok=$(echo "$resp" | jq -r .ok)
          total=$(echo "$resp" | jq -r .total)
          rejected=$(echo "$resp" | jq -r '[.results[] | select(.status != "ok")] | length')
          echo "fan-out: $ok/$total host(s) accepted ${{ steps.cfg.outputs.tag }}"
          if [ "$rejected" -gt 0 ]; then
            echo "::warning::$rejected host(s) did not accept the envelope (likely cross-platform or update_mode=manual/never)"
            echo "$resp" | jq '.results[] | select(.status != "ok")'
          fi
          # The job has already validated the canary applied cleanly,
          # so even if the fan-out has rejections (cross-platform, etc),
          # the rollout itself is considered successful — the operator
          # follows up on rejections per host.
