# SeaweedFS single-node deployment via outpost's source-canonical
# pipeline. The Dockerfile next to this file builds the `weed` binary
# from upstream tag v3.97; that image is built locally on whichever
# outpost the pod lands on. No image registry involved.
#
# Operationally this is v1: master + volume + S3 gateway all live in
# one pod, the storage is ephemeral (vkpodman doesn't wire PVCs yet),
# and there's one replica pinned to one node. Once cross-outpost pod
# networking lands we'll split into a master Deployment + per-node
# volume DaemonSet with replication factor 010.
#
# Apply with:
#   kubectl apply -f seaweedfs.yaml
# Then browse to:
#   https://ai.dhnt.io/api/cluster/svc/s3/
# (Probably want an actual S3 client to do anything useful with it.)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  labels: {app: seaweedfs}
  annotations:
    outpost.dhnt.io/build-source: "git+https://github.com/qiangli/outpost@main"
    outpost.dhnt.io/build-dockerfile: "Dockerfile"
    outpost.dhnt.io/build-context: "examples/seaweedfs"
spec:
  replicas: 1
  selector:
    matchLabels: {app: seaweedfs}
  template:
    metadata:
      labels: {app: seaweedfs}
      annotations:
        outpost.dhnt.io/build-source: "git+https://github.com/qiangli/outpost@main"
        outpost.dhnt.io/build-dockerfile: "Dockerfile"
        outpost.dhnt.io/build-context: "examples/seaweedfs"
    spec:
      # Pinned to a single node while we don't have replication —
      # the named volume that backs HostPath lives in *that* node's
      # podman volume store, so re-scheduling onto a different node
      # would silently give the new pod an empty volume. Remove the
      # nodeSelector once the per-node volume DaemonSet ships.
      nodeSelector:
        kubernetes.io/hostname: dragon
      tolerations: [{key: virtual-kubelet.io/provider, operator: Exists}]
      # K8s otherwise auto-injects $S3_PORT=tcp://… for every
      # Service in the namespace named "s3" — and SeaweedFS reads
      # $S3_PORT as the numeric S3 listener port, so the container
      # crashes immediately with "strconv.ParseInt … invalid
      # syntax". Disabling service-links suppresses the entire
      # service-env-var family (we don't need any of them; pods
      # discover services via cluster-svc, not env).
      enableServiceLinks: false
      # Persistent storage via HostPath. In outpost vkpodman the
      # path is a **logical identifier**, not a literal host
      # directory: the translator turns it into a libpod named
      # volume (outpost-hp-<sha1(namespace+path)>) so the data
      # lives inside podman's volume store and survives container
      # removal. Two pods in the same namespace declaring the same
      # path share the volume — which is the K8s HostPath contract
      # ("this exact directory") expressed in terms podman can
      # honor on macOS (where /tmp on the host is not visible to
      # the vfkit/libkrun VM). Operators inspect with `podman volume
      # inspect outpost-hp-...`; drop persistent data with
      # `podman volume rm`.
      volumes:
      - name: data
        hostPath:
          path: /var/outpost/volumes/seaweedfs-data
          type: DirectoryOrCreate
      containers:
      - name: weed
        image: localhost/cluster/seaweedfs:4.29
        imagePullPolicy: IfNotPresent
        ports:
        # 8333 is the S3 gateway. Other ports stay container-internal
        # for now; expose more if we want direct master/volume access.
        - containerPort: 8333
        volumeMounts:
        - name: data
          mountPath: /data
        readinessProbe:
          tcpSocket: {port: 8333}
          initialDelaySeconds: 10
          periodSeconds: 5
        # TCP probe rather than HTTPGet because the S3 gateway briefly
        # 4xxs while the master is still bootstrapping. The listener
        # being up is the right "vkpodman can route traffic here"
        # signal; per-API health checks belong to the client.
---
apiVersion: v1
kind: Service
metadata:
  name: s3
  annotations:
    # Object stores are usually fine with plain round-robin — S3
    # clients keep state in cookies / signature, not in connection
    # affinity. Stick with the default (no annotation).
spec:
  selector: {app: seaweedfs}
  ports: [{port: 80, targetPort: 8333}]
