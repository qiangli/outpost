# EXAMPLE ONLY — the encryptedData below is a placeholder. Generate the real
# sealed value per env with kubeseal (see gitops/README.md); the sealed form is
# safe to commit, the plaintext never is. One per env (qa, prod), each scoped to
# its own namespace so a dev secret can't decrypt in prod.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hello-tessaro-qa-sso
  namespace: hello-tessaro-qa
spec:
  encryptedData:
    sso-secret: AgB<...replace-with-kubeseal-output...>
  template:
    metadata:
      name: hello-tessaro-qa-sso
      namespace: hello-tessaro-qa
    type: Opaque
