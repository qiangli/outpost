{{- /*
Only create a Secret when an inline ssoSecret is given AND no external
ssoSecretName is set. qa/prod set ssoSecretName and provide the value via a
per-env Sealed Secret (see gitops/), so this template renders nothing there —
the secret never lives in git.
*/ -}}
{{- if and .Values.ssoSecret (not .Values.ssoSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hello-tessaro.ssoSecretName" . }}
  labels: {{- include "hello-tessaro.labels" . | nindent 4 }}
type: Opaque
stringData:
  sso-secret: {{ .Values.ssoSecret | quote }}
{{- end }}
