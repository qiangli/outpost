{{- if .Values.networkPolicy.enabled }}
# Default-deny for the app pods, then allow only DNS egress and same-namespace
# (+ optionally a labelled proxy namespace) ingress. This closes the "no
# NetworkPolicy isolation between namespaces" gap so dev/qa/prod can't reach each
# other's pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hello-tessaro.fullname" . }}-default-deny
  labels: {{- include "hello-tessaro.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "hello-tessaro.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    # Same-namespace traffic (the reverse-proxy Service lands here).
    - from:
        - podSelector: {}
    {{- if .Values.networkPolicy.proxyNamespaceLabel }}
    # A labelled proxy namespace (e.g. where cloudbox/outpost proxies from).
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.proxyNamespaceLabel }}: "true"
    {{- end }}
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
