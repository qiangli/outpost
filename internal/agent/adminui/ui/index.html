<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>outpost admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: light dark;
    font-family: system-ui, -apple-system, sans-serif;
    /* Surface tints used by drawers, code blocks, and small
       inline badges. Defined as variables so dark mode can
       remap them in one place rather than at every callsite. */
    --surface: #f7f9fc;
    --surface-strong: #fbfcfd;
    --surface-badge: #f0f1f3;
    --surface-border: #d8dce0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1d22;
      --surface-strong: #1e2228;
      --surface-badge: #2a2f36;
      --surface-border: #353a42;
    }
  }
  body { margin: 0; padding: 2rem; max-width: 720px; }
  h1 { margin-top: 0; font-size: 1.4rem; }
  h2 { font-size: 1.05rem; margin-top: 1.8rem; }
  fieldset { border: 1px solid #ccc4; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
  legend { padding: 0 0.4rem; font-weight: 600; }
  label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; }
  label > input:not([type=checkbox]), label > select { display: block; margin-top: 0.2rem; }
  /* Checkbox-bearing labels: keep the box inline with its caption text. */
  label.check { display: flex; align-items: center; gap: 0.4rem; }
  input[type=text], input[type=password], input[type=url], input[type=number], select {
    padding: 0.4rem; border: 1px solid #8884; border-radius: 4px; width: 100%; box-sizing: border-box;
  }
  button { padding: 0.5rem 0.9rem; border: 0; border-radius: 4px; cursor: pointer;
           background: #2563eb; color: white; font-weight: 600; }
  button.secondary { background: transparent; color: inherit; border: 1px solid #8888; }
  button.danger { background: #b91c1c; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .row { display: flex; gap: 0.5rem; align-items: end; }
  .row > * { flex: 1; }
  .row > button { flex: 0 0 auto; }
  .msg { padding: 0.5rem 0.7rem; border-radius: 4px; margin-bottom: 0.7rem; }
  .msg.ok  { background: #16a34a22; }
  .msg.err { background: #dc262622; color: #fca5a5; border-left: 3px solid #dc2626; }
  /* Modal dialog used for outbound Connect (replaces the native prompt). */
  dialog.auth-dialog { background: #1a1d23; color: inherit; border: 1px solid #8884;
                       border-radius: 8px; padding: 1.2rem 1.4rem;
                       min-width: 340px; max-width: 90vw;
                       color-scheme: dark; }
  dialog.auth-dialog::backdrop { background: rgba(0,0,0,0.55); }
  dialog.auth-dialog h2 { margin: 0 0 0.4rem; font-size: 1.05rem; }
  dialog.auth-dialog p  { margin: 0 0 0.8rem; font-size: 0.85rem; opacity: 0.8; }
  dialog.auth-dialog form { display: flex; flex-direction: column; gap: 0.7rem; }
  dialog.auth-dialog .dialog-error { color: #fca5a5; font-size: 0.85rem;
                                     min-height: 1rem; font-weight: 600; }
  dialog.auth-dialog .actions { display: flex; gap: 0.5rem; justify-content: flex-end;
                                margin-top: 0.4rem; }
  /* Pair-host paired-status banner: green-tinted card that replaces the
     pair form once the outpost is paired. Mirrors the look of a success
     message but heavier and more permanent. */
  .paired-status { display: flex; align-items: center; gap: 0.8rem;
                   padding: 0.9rem 1rem; border-radius: 8px;
                   background: #16a34a1a; border: 1px solid #16a34a55;
                   font-size: 0.95rem; }
  .paired-status .check { width: 1.6rem; height: 1.6rem; border-radius: 50%;
                          background: #16a34a; color: white; display: flex;
                          align-items: center; justify-content: center;
                          font-weight: 700; flex: 0 0 auto; }
  .paired-status .grow { flex: 1; }
  .paired-status code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                        font-size: 0.9em; opacity: 0.95; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
  th, td { text-align: left; padding: 0.4rem; border-bottom: 1px solid #8882; font-size: 0.9rem; }
  .pill { display: inline-block; padding: 0 0.4rem; border-radius: 999px; font-size: 0.75rem;
          background: #2563eb22; }
  .pill.off { background: #8884; }
  .toggle-row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .toggle-row label { display: flex; align-items: center; gap: 0.4rem; }
  .toggle-row label.disabled { opacity: 0.55; }
  .hint { font-size: 0.75rem; opacity: 0.7; margin-left: 0.4rem; }
  /* key-hint surfaces the canonical agent.json key next to a human
     label. Same color treatment as .hint but tighter type so it reads
     as metadata rather than primary content. */
  .key-hint { font-family: ui-monospace, SFMono-Regular, monospace;
              font-size: 0.7rem; opacity: 0.55; margin-left: 0.4rem;
              padding: 0.05rem 0.3rem; background: var(--surface-badge); border-radius: 3px; }

  /* Disclosure chevron used to expand/collapse nested settings under
     parent built-ins (SSH ▶ -L/-R/-A/sftp/forward-sockets;
     Podman ▶ cluster/kubeconfig). Triangle rotates 90° on open.
     Kept small + subtle so it doesn't compete with the toggle. */
  .chevron {
    background: none; border: none; cursor: pointer;
    font-size: 0.7rem; line-height: 1;
    opacity: 0.55; color: inherit;
    padding: 0.3rem 0.5rem; margin-left: 0.2rem;
    transition: transform 0.18s ease, opacity 0.18s ease;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .chevron:hover { opacity: 0.95; }
  .chevron[aria-expanded="true"] { transform: rotate(90deg); opacity: 0.9; }

  /* Indented container for nested rows under a twistered parent.
     Thin left accent so the visual hierarchy reads at a glance. */
  .item-subblock {
    margin: 0.15rem 0 0.4rem 1.8rem;
    padding: 0.5rem 0 0.5rem 1rem;
    border-left: 2px solid #e3e6ea;
    display: flex; flex-direction: column; gap: 0.25rem;
  }
  .item-subblock.hidden { display: none; }
  .item-subblock .item-row { padding: 0.25rem 0; }
  .item-subblock h4 {
    margin: 0.4rem 0 0.2rem; font-size: 0.85rem;
    font-weight: 600; opacity: 0.75;
  }

  /* Legend variant that sits the section title + an "Add" action
     button on the same row. Used by Custom apps and Outbound. */
  legend.with-action {
    display: inline-flex; align-items: center; gap: 0.6rem;
    padding: 0 0.4rem;
  }
  .legend-action {
    background: none;
    border: 1px solid #2563eb55;
    color: #2563eb;
    font-weight: 600; font-size: 0.82rem;
    padding: 0.18rem 0.55rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    line-height: 1.2;
  }
  .legend-action:hover {
    background: #2563eb11;
    border-color: #2563eb;
  }
  .legend-action.open {
    background: #2563eb;
    color: white;
    border-color: #2563eb;
  }
  /* Drawer revealed by the legend-action button. Sits between the
     legend and the list of existing items. Subtle tint + thin
     border so it reads as a separate panel without dominating.
     Surface vars adapt for prefers-color-scheme: dark. */
  .add-drawer {
    margin: 0.5rem 0 0.75rem;
    padding: 0.6rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--surface-border); border-radius: 6px;
  }
  .add-drawer.hidden { display: none; }

  /* Code-block surface for the .mcp.json snippet on the Pair tab.
     Same surface vars as the add-drawer so light/dark both work. */
  .snippet-pre {
    background: var(--surface-strong);
    border: 1px solid var(--surface-border);
    color: inherit;
  }
  /* iOS-style toggle switch wrapping a hidden checkbox. */
  .switch { position: relative; display: inline-block; width: 36px; height: 20px; flex: 0 0 auto; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; inset: 0; background: #8884; border-radius: 999px;
                    cursor: pointer; transition: background .15s; }
  .switch .slider::before { content: ''; position: absolute; left: 2px; top: 2px;
                             width: 16px; height: 16px; background: white; border-radius: 50%;
                             transition: transform .15s; }
  .switch input:checked + .slider { background: #2563eb; }
  .switch input:checked + .slider::before { transform: translateX(16px); }
  .switch input:disabled + .slider { opacity: 0.45; cursor: not-allowed; }
  /* Vertical lists for built-ins and apps (one row per item). */
  .item-list { display: flex; flex-direction: column; gap: 0; }
  .item-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0;
              border-bottom: 1px solid #8882; }
  .item-row:last-child { border-bottom: 0; }
  .item-row.dim { opacity: 0.55; }
  .item-row.stacked { flex-direction: column; align-items: stretch; gap: 0.35rem; }
  .item-row.stacked .line { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .item-row .grow { flex: 1; min-width: 0; }
  .item-row .label { font-weight: 600; min-width: 7rem; }
  .item-row a { color: #2563eb; text-decoration: none; word-break: break-all; }
  .item-row a:hover { text-decoration: underline; }
  /* Header: title left, action buttons right, on one line. */
  header.app-header { display: flex; justify-content: space-between; align-items: center;
                       margin-bottom: 1rem; gap: 1rem; flex-wrap: wrap; }
  header.app-header h1 { margin: 0; display: flex; align-items: center; gap: 0.6rem; }
  header.app-header .actions { display: flex; gap: 0.5rem; }
  .login-form { max-width: 320px; }
  /* Section-group heading — Inbound, Outbound. Renders heavier than the
     fieldset legends below it so the grouping reads as the dominant
     hierarchy. */
  .section-head { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.04em;
                  text-transform: uppercase; opacity: 0.75;
                  margin: 1.6rem 0 0.4rem; }
  /* Tab bar — Pair host / Inbound / Outbound. Active tab gets a blue
     underline; inactive tabs dim. Panels stack but only the active one
     is visible. */
  .tabs { display: flex; gap: 0.25rem; border-bottom: 1px solid #8884;
          margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { background: transparent; color: inherit; border: 0;
         border-bottom: 2px solid transparent; padding: 0.55rem 1.1rem;
         font-weight: 600; cursor: pointer; opacity: 0.6;
         font-size: 0.95rem; }
  .tab:hover { opacity: 0.9; }
  .tab.active { opacity: 1; border-bottom-color: #2563eb; }
  .tab-panel.hidden { display: none; }
</style>
</head>
<body>
<header class="app-header">
  <h1>outpost admin</h1>
  <div id="header-actions" class="actions"></div>
</header>
<div id="msg-host"></div>
<div id="app">Loading…</div>

<script>
const $ = sel => document.querySelector(sel);
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v === false || v == null) {} else n.setAttribute(k, v === true ? '' : v);
  }
  for (const k of kids.flat()) n.append(k && k.nodeType ? k : document.createTextNode(k == null ? '' : k));
  return n;
};

// coinLogo — the DHNT.io / Cloudbox mark, ported from cloudbox's
// CoinLogo React component (ui/src/components/coin-logo.tsx). Inline
// SVG so the admin UI stays a single self-contained file. Each call
// uses a fresh gradient id so multiple coins on one page render
// correctly.
let coinIdCounter = 0;
function coinLogo(size = 28, holeColor = 'transparent') {
  const id = 'coin-grad-' + (coinIdCounter++);
  const wrap = document.createElement('span');
  wrap.style.display = 'inline-flex';
  wrap.style.alignItems = 'center';
  wrap.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 100 100" aria-label="DHNT.io Cloudbox" role="img">
    <defs>
      <radialGradient id="${id}" cx="40%" cy="35%" r="70%">
        <stop offset="0%" stop-color="#fafbfd"/>
        <stop offset="45%" stop-color="#c2c8d1"/>
        <stop offset="80%" stop-color="#7c8590"/>
        <stop offset="100%" stop-color="#3e4651"/>
      </radialGradient>
    </defs>
    <circle cx="50" cy="50" r="47" fill="url(#${id})" stroke="#3a4250" stroke-width="0.8"/>
    <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.6"/>
    <rect x="33" y="33" width="34" height="34" fill="none" stroke="#3a4250" stroke-width="1.6"/>
    <rect x="40" y="40" width="20" height="20" fill="${holeColor}"/>
  </svg>`;
  return wrap.firstElementChild;
}

// passwordDialog renders a modal asking for a password and runs the
// caller-supplied onSubmit(password) when the user submits. If onSubmit
// throws, the dialog stays open and shows the error message in red
// instead of dismissing — so the operator can correct a typo without
// retyping the form. Resolves with true on success, false on cancel.
function passwordDialog({title, description, submitText = 'Connect', onSubmit}) {
  return new Promise((resolve) => {
    const dlg = document.createElement('dialog');
    dlg.className = 'auth-dialog';
    const form = el('form', {},
      el('h2', {}, title),
      description ? el('p', {}, description) : '',
      el('label', {}, 'Password',
        el('input', {type: 'password', name: 'password', autocomplete: 'current-password', required: true})),
      el('div', {class: 'dialog-error'}, ''),
      el('div', {class: 'actions'},
        el('button', {type: 'button', class: 'secondary cancel'}, 'Cancel'),
        el('button', {type: 'submit', class: 'submit'}, submitText),
      ),
    );
    dlg.append(form);
    document.body.append(dlg);
    const input = dlg.querySelector('input');
    const errEl = dlg.querySelector('.dialog-error');
    const cancelBtn = dlg.querySelector('.cancel');
    const submitBtn = dlg.querySelector('.submit');

    const close = (ok) => { dlg.close(); dlg.remove(); resolve(ok); };
    cancelBtn.addEventListener('click', () => close(false));
    dlg.addEventListener('cancel', (ev) => { ev.preventDefault(); close(false); });
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      errEl.textContent = '';
      submitBtn.disabled = true;
      try {
        await onSubmit(input.value);
        close(true);
      } catch (e) {
        errEl.textContent = e.message || 'Failed';
        submitBtn.disabled = false;
        input.select();
      }
    });

    dlg.showModal();
    setTimeout(() => input.focus(), 0);
  });
}

// confirmDialog renders a styled yes/no modal in the same auth-dialog
// shell as passwordDialog. Returns a promise that resolves true on
// confirm, false on cancel/Escape. Replaces window.confirm so the
// styling matches the rest of the admin UI (the browser-native confirm
// renders out of theme and pops outside the page on some platforms).
function confirmDialog({title, description, confirmText = 'Remove', cancelText = 'Cancel', danger = true}) {
  return new Promise((resolve) => {
    const dlg = document.createElement('dialog');
    dlg.className = 'auth-dialog';
    const confirmBtn = el('button', {type: 'button', class: 'submit' + (danger ? ' danger' : '')}, confirmText);
    const cancelBtn  = el('button', {type: 'button', class: 'secondary cancel'}, cancelText);
    dlg.append(
      el('h2', {}, title),
      description ? el('p', {}, description) : '',
      el('div', {class: 'actions'}, cancelBtn, confirmBtn),
    );
    document.body.append(dlg);
    const close = (ok) => { dlg.close(); dlg.remove(); resolve(ok); };
    cancelBtn.addEventListener('click', () => close(false));
    confirmBtn.addEventListener('click', () => close(true));
    dlg.addEventListener('cancel', (ev) => { ev.preventDefault(); close(false); });
    dlg.showModal();
    setTimeout(() => confirmBtn.focus(), 0);
  });
}

// switchEl builds an iOS-style toggle: a hidden checkbox + a styled span.
// Returns {wrap, input} so callers can attach a listener to the input.
function switchEl(props={}) {
  const wrap = document.createElement('label');
  wrap.className = 'switch';
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  if (props.checked) inp.checked = true;
  if (props.disabled) inp.disabled = true;
  const slider = document.createElement('span');
  slider.className = 'slider';
  wrap.append(inp, slider);
  return {wrap, input: inp};
}

function msg(kind, text) {
  const host = $('#msg-host');
  host.innerHTML = '';
  host.append(el('div', {class: 'msg ' + kind}, text));
  if (kind === 'ok') setTimeout(() => { host.innerHTML = ''; }, 4000);
}

// TTL_INFINITE matches the server-side sentinel for "no absolute cap".
// We pick Number.MAX_SAFE_INTEGER (9007199254740991) rather than Go's
// math.MaxInt64 because the latter cannot round-trip through JavaScript
// JSON numbers (Number is float64); MAX_SAFE_INTEGER stringifies and
// parses cleanly across the wire.
const TTL_INFINITE = Number.MAX_SAFE_INTEGER;

// formatTTL returns a short human-readable form: "default" (0/missing),
// "infinite" (sentinel), or e.g. "24h" / "30m" / "45s" for finite values.
function formatTTL(seconds) {
  if (!seconds) return 'default';
  if (seconds >= TTL_INFINITE) return 'infinite';
  if (seconds % 86400 === 0) return (seconds / 86400) + 'd';
  if (seconds % 3600 === 0) return (seconds / 3600) + 'h';
  if (seconds % 60 === 0) return (seconds / 60) + 'm';
  return seconds + 's';
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(path, opts);
  let data = {};
  try { data = await resp.json(); } catch (_) {}
  if (!resp.ok) {
    // Session expired between page load and now: the SPA still has
    // cached cfg from the prior session and is rendering stale state,
    // but every save attempts a 401 and the catch blocks (in toggles,
    // forms, etc.) revert the visual. That looks like "toggles don't
    // work" without revealing the actual cause. Force the login
    // overlay instead so the operator re-auths and the cached state
    // gets refreshed.
    if (resp.status === 401) {
      renderLogin();
    }
    const err = new Error(data.error || resp.statusText);
    err.status = resp.status;
    throw err;
  }
  return data;
}

// restartNeeded: sticky banner state. A save that returned
// restart_pending sets this to true; it persists across re-renders
// until the operator clicks "Restart now" in the banner. The header
// "Restart outpost" button always restarts regardless. We keep this
// in JS state (not on the server) because the server's only ground
// truth is whether the live process's mounted-at-boot state diverges
// from on-disk FileConfig — and we already know the answer here
// because we're the one who just made the save call.
let restartNeeded = false;

// Network-error transient retries: render() may be called immediately
// after a restart was triggered elsewhere (e.g. the user clicked the
// header Restart button in another tab); a couple of fetches will
// fail before the new process binds. Retry briefly before falling
// back to the fatal screen.
async function fetchWithRetry(method, path, body, opts) {
  const tries = (opts && opts.tries) || 1;
  const delayMs = (opts && opts.delayMs) || 0;
  let lastErr;
  for (let i = 0; i < tries; i++) {
    try { return await api(method, path, body); }
    catch (e) {
      lastErr = e;
      // Only retry pure network failures — HTTP errors with a status
      // (4xx/5xx) are not transient and shouldn't be papered over.
      if (e.status) throw e;
      if (i < tries - 1) await new Promise(r => setTimeout(r, delayMs));
    }
  }
  throw lastErr;
}

async function render() {
  let status;
  try {
    status = await fetchWithRetry('GET', '/api/status', undefined, {tries: 6, delayMs: 500});
  } catch (e) {
    if (e.status === 401) return renderLogin();
    return renderFatal(e);
  }
  let cfg;
  try {
    cfg = await fetchWithRetry('GET', '/api/config', undefined, {tries: 6, delayMs: 500});
  } catch (e) {
    if (e.status === 401) return renderLogin();
    return renderFatal(e);
  }
  renderMain(status, cfg);
}

function renderFatal(e) {
  $('#app').innerHTML = '';
  $('#app').append(el('div', {class: 'msg err'}, 'Failed to load: ' + (e.message || e)));
}

// noteRestartPending: call after any save whose response carries the
// `restarting: true` flag. Sets the banner state and re-renders the
// banner so the operator sees a sticky "Restart to apply" cue. We
// intentionally do NOT trigger pollUntilUp here — letting the operator
// batch several changes before restarting is the whole point.
function noteRestartPending(res) {
  if (res && res.restarting && !restartNeeded) {
    restartNeeded = true;
    renderRestartBanner();
  }
}

// renderRestartBanner mounts (or removes) the sticky "Restart required"
// banner under the header. Idempotent — safe to call from anywhere.
function renderRestartBanner() {
  const existing = document.getElementById('restart-banner');
  if (!restartNeeded) {
    if (existing) existing.remove();
    return;
  }
  if (existing) return; // already showing
  const banner = el('div', {
    id: 'restart-banner',
    style: 'background:#fef3c7;border:1px solid #f59e0b;color:#78350f;' +
           'padding:0.55rem 0.9rem;border-radius:6px;margin:0 0 1rem;' +
           'display:flex;align-items:center;gap:0.8rem',
  });
  banner.append(
    el('span', {style: 'flex:1'},
      el('strong', {}, 'Restart required'),
      ' — some changes won\'t take effect until outpost restarts.'),
    el('button', {
      type: 'button',
      style: 'background:#b45309;color:white;border:0;padding:0.35rem 0.8rem;border-radius:4px;cursor:pointer',
      onclick: async (ev) => {
        ev.target.disabled = true;
        ev.target.textContent = 'Restarting…';
        try {
          await api('POST', '/api/restart');
          restartNeeded = false;
          await pollUntilUp();
        } catch (e) {
          msg('err', e.message || 'Restart failed');
          ev.target.disabled = false;
          ev.target.textContent = 'Restart now';
        }
      },
    }, 'Restart now'),
  );
  const app = $('#app');
  app.insertBefore(banner, app.firstChild);
}

function renderLogin() {
  const app = $('#app');
  app.innerHTML = '';
  // No Restart/Sign out before login.
  const ha = $('#header-actions');
  if (ha) ha.innerHTML = '';
  const form = el('form', {class: 'login-form'});
  form.append(
    el('h2', {}, 'Sign in with your OS password'),
    el('label', {}, 'Username',
      el('input', {type: 'text', name: 'user', autocomplete: 'username'})),
    el('label', {}, 'Password',
      el('input', {type: 'password', name: 'password', autocomplete: 'current-password'})),
    el('button', {type: 'submit'}, 'Sign in'),
  );
  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(form);
    try {
      await api('POST', '/api/login', { user: fd.get('user'), password: fd.get('password') });
      msg('ok', 'Signed in');
      render();
    } catch (e) {
      msg('err', e.message || 'Login failed');
    }
  });
  app.append(form);
  // Prefill the username with the running OS user if we can guess.
  api('GET', '/api/status').then(s => {
    if (s.current_os_user) form.querySelector('input[name=user]').value = s.current_os_user;
  }).catch(() => {});
}

// activeTab is persisted across renders so a save-triggered re-render
// doesn't kick the user back to the default tab. Keys: 'pair',
// 'inbound', 'outbound'.
const TAB_KEY = 'outpost.activeTab';

// buildPairSection returns a fresh fieldset for the pair-host tab.
// Always shows the form so the operator can re-pair or update the host
// name at any time. When already paired, a green status banner sits
// above the form to make the current identity obvious.
function buildPairSection(status, cfg) {
  const pairing = el('fieldset', {});
  pairing.append(el('legend', {}, 'Pair host'));
  if (status.configured) {
    pairing.append(el('div', {class: 'paired-status'},
      el('span', {class: 'check'}, '✓'),
      el('div', {class: 'grow'},
        el('div', {}, 'Currently paired as ',
          el('strong', {}, status.agent_name || '(unknown)'),
          ' on ',
          el('code', {}, status.server_addr || '(unknown)'), '.'),
        el('div', {class: 'hint', style: 'margin-top:0.25rem'},
          'Submit a new pairing code below to re-pair or rename this host.')),
    ));
  } else {
    pairing.append(el('p', {}, 'Not yet paired. Get a one-time code from the portal.'));
  }
  const portalURL = cfg.defaults.server_url || 'https://ai.dhnt.io';
  const pf = el('form', {style: status.configured ? 'margin-top:0.8rem' : ''});
  pf.append(
    el('label', {}, 'Portal URL',
      el('input', {type: 'url', name: 'server', value: portalURL, disabled: true})),
    el('label', {}, 'Pairing code',
      el('input', {type: 'text', name: 'code', autocomplete: 'off', required: true,
        placeholder: status.configured ? 'paste a new one-time code to re-pair' : ''})),
    el('label', {}, 'Host name',
      el('input', {type: 'text', name: 'name',
        value: cfg.agent_name || cfg.defaults.name || '', required: true})),
    el('button', {type: 'submit'}, status.configured ? 'Re-pair & restart' : 'Save & restart'),
  );
  pf.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(pf);
    const btn = pf.querySelector('button');
    btn.disabled = true;
    try {
      await api('POST', '/api/config/register', {
        server: portalURL,
        code: fd.get('code'),
        name: fd.get('name'),
      });
      msg('ok', 'Saved. Restarting outpost — refresh in a few seconds.');
      pollUntilUp();
    } catch (e) {
      btn.disabled = false;
      msg('err', e.message || 'Pairing failed');
    }
  });
  pairing.append(pf);
  return pairing;
}

// buildMCPCredentialsSection returns a fieldset showing the MCP
// endpoint + bearer token agent tools (Claude Code, Windsurf, ...)
// need in their .mcp.json. Always rendered — the MCP server runs
// regardless of pairing, since outpost_pair is one of the tools.
//
// The token is masked by default; reveal/copy/rotate are buttons
// next to it. Rotate is confirm-gated because the OLD token stops
// authenticating immediately.
function buildMCPCredentialsSection() {
  const wrap = el('fieldset', {});
  wrap.append(el('legend', {}, 'Agent tool credentials (MCP)'));
  wrap.append(el('p', {class: 'hint'},
    'Configure any MCP-capable agent (Claude Code, Windsurf, etc.) ' +
    'to drive this outpost via the Model Context Protocol. The ' +
    'endpoint + bearer are below; the full .mcp.json snippet sits ' +
    'inside the "Show snippet" twister to keep the page calm.'));

  // Default endpoint = current browser origin + /mcp/. That's the
  // real MCP URL whenever the operator is hitting the SPA in a
  // browser, so the snippet is correct even before the async
  // /api/mcp/credentials fetch completes. The fetch just confirms +
  // fills in the bearer.
  const defaultEndpoint = location.origin + '/mcp/';
  const endpointVal = el('code', {style: 'word-break:break-all'}, defaultEndpoint);
  const tokenVal    = el('code', {style: 'word-break:break-all'}, '•'.repeat(20));
  // Thin border + light tint instead of the previous solid gray
  // background — same monospace block feel, less "wall of white".
  const snippet     = el('pre', {class: 'snippet-pre', style: 'padding:0.6rem 0.75rem;border-radius:6px;overflow-x:auto;font-size:0.85em;margin:0.5rem 0 0;line-height:1.4'}, '');

  let liveToken = '';
  let revealed = false;
  const revealBtn = el('button', {type: 'button', class: 'secondary'}, 'Reveal');
  const copyEndpoint = el('button', {type: 'button', class: 'secondary'}, 'Copy URL');
  const copyToken = el('button', {type: 'button', class: 'secondary'}, 'Copy token');
  const rotateBtn = el('button', {type: 'button', class: 'secondary danger'}, 'Rotate');

  function updateSnippet() {
    const ep = endpointVal.textContent || defaultEndpoint;
    const tk = revealed ? liveToken : '<bearer-token>';
    snippet.textContent =
      '{\n' +
      '  "mcpServers": {\n' +
      '    "outpost": {\n' +
      '      "type": "http",\n' +
      '      "url": "' + ep + '",\n' +
      '      "headers": {\n' +
      '        "Authorization": "Bearer ' + tk + '"\n' +
      '      }\n' +
      '    }\n' +
      '  }\n' +
      '}';
  }
  // Render the snippet immediately so the operator sees a valid
  // template the moment they expand the twister — no "loading…"
  // flash, no apparent-blank-block.
  updateSnippet();

  function setRevealed(on) {
    revealed = on;
    tokenVal.textContent = on ? (liveToken || '(empty)') : '•'.repeat(20);
    revealBtn.textContent = on ? 'Hide' : 'Reveal';
    updateSnippet();
  }

  revealBtn.addEventListener('click', () => setRevealed(!revealed));
  copyEndpoint.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(endpointVal.textContent); msg('ok', 'Endpoint copied'); }
    catch (e) { msg('err', 'Clipboard write failed'); }
  });
  copyToken.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(liveToken); msg('ok', 'Token copied'); }
    catch (e) { msg('err', 'Clipboard write failed'); }
  });
  rotateBtn.addEventListener('click', async () => {
    const ok = await confirmDialog({
      title: 'Rotate MCP bearer token?',
      description: 'The CURRENT token stops authenticating immediately. ' +
        'Any agent tool with the old token in its .mcp.json will fail ' +
        'until you update it with the new value shown here.',
      confirmText: 'Rotate',
      danger: true,
    });
    if (!ok) return;
    try {
      const res = await api('POST', '/api/mcp/token/rotate');
      liveToken = res.token || '';
      endpointVal.textContent = res.endpoint || endpointVal.textContent;
      setRevealed(true);
      msg('ok', 'Token rotated. Update your .mcp.json with the new value.');
    } catch (e) { msg('err', e.message || 'Rotation failed'); }
  });

  const rows = el('div', {class: 'mcp-creds-rows', style: 'display:grid;grid-template-columns:max-content 1fr max-content;gap:0.4rem 0.8rem;align-items:center;margin:0.6rem 0'});
  rows.append(
    el('strong', {}, 'Endpoint'),
    endpointVal,
    copyEndpoint,
    el('strong', {}, 'Bearer'),
    tokenVal,
    el('span', {style: 'display:inline-flex;gap:0.3rem'}, revealBtn, copyToken, rotateBtn),
  );

  // Snippet sits inside a collapsed <details> so the Pair tab
  // doesn't show a big gray pre-block at rest. Operators wanting
  // to copy-paste expand the twister once.
  const snippetWrap = el('details', {style: 'margin-top:0.6rem'});
  snippetWrap.append(
    el('summary', {style: 'cursor:pointer;font-size:0.9rem;opacity:0.85'},
      'Show .mcp.json snippet'),
    snippet,
  );
  wrap.append(rows, snippetWrap);

  // Async fetch — the SPA renders the wrap synchronously with a
  // valid template using the browser-origin endpoint as a fallback,
  // then fills in the real bearer once /api/mcp/credentials returns.
  // On error we keep the default endpoint and add a small inline
  // hint rather than blanking out the snippet.
  (async () => {
    try {
      const res = await api('GET', '/api/mcp/credentials');
      liveToken = res.token || '';
      if (res.endpoint) endpointVal.textContent = res.endpoint;
      updateSnippet();
    } catch (e) {
      const note = el('span', {class: 'hint', style: 'margin-left:0.4rem;color:#c2410c'},
        '(bearer fetch failed: ' + (e.message || 'error') + ')');
      tokenVal.after(note);
    }
  })();
  return wrap;
}

// buildAdvancedSettingsSection covers the persisted settings on the
// Pair tab that don't fit pairing or MCP-credentials boxes: network
// bind addresses + the OS-auth admin allowlist. SSH channel knobs
// live under the SSH twister in the Inbound tab — they're SSH server
// internals, so grouping them with SSH is clearer than scattering
// them in a generic "advanced" bucket.
//
// Rendered as a collapsed <details> twister so the Pair tab stays
// focused on the common path (pair + MCP credentials) and only
// reveals these knobs when the operator clicks.
function buildAdvancedSettingsSection(cfg) {
  const wrap = el('details', {style: 'margin-top:1rem'});
  wrap.append(el('summary',
    {style: 'cursor:pointer;font-size:0.95rem;font-weight:600'},
    'Advanced settings (networking, admin allowlist)'));
  wrap.append(el('p', {class: 'hint', style: 'margin-top:0.6rem'},
    'Network binds and the OS-auth admin allowlist. ' +
    'Changes here restart the daemon when the host is paired.'));

  // --- Networking row group -------------------------------------------------
  const netForm = el('form', {style: 'display:grid;grid-template-columns:max-content 1fr;gap:0.4rem 0.8rem;align-items:center'});
  const localAddrIn = el('input', {type: 'text', name: 'local_addr', value: cfg.local_addr || '', placeholder: cfg.defaults.local_addr || '127.0.0.1:0'});
  const vncAddrIn   = el('input', {type: 'text', name: 'vnc_addr',   value: cfg.vnc_addr   || '', placeholder: cfg.defaults.vnc_addr   || '127.0.0.1:5900'});
  const adminAddrIn = el('input', {type: 'text', name: 'admin_addr', value: cfg.admin_addr || '', placeholder: cfg.defaults.admin_addr || '127.0.0.1:17777'});
  netForm.append(
    el('label', {for: 'local_addr'}, 'local_addr'), localAddrIn,
    el('label', {for: 'vnc_addr'},   'vnc_addr'),   vncAddrIn,
    el('label', {for: 'admin_addr'}, 'admin_addr'), adminAddrIn,
  );
  const netBtn = el('button', {type: 'button'}, 'Save networking');
  netBtn.addEventListener('click', async () => {
    // Pointer-string semantics on the wire: empty input means
    // "clear to default", non-empty means "set to this value".
    // We send all three explicitly because the operator may have
    // intended an empty value (revert) as well as a new value.
    const payload = {
      local_addr: localAddrIn.value.trim(),
      vnc_addr: vncAddrIn.value.trim(),
      admin_addr: adminAddrIn.value.trim(),
    };
    netBtn.disabled = true;
    try {
      const res = await api('POST', '/api/config/networking', payload);
      msg('ok', 'Networking saved.');
      noteRestartPending(res);
    } catch (e) {
      msg('err', e.message || 'Save failed');
    } finally {
      netBtn.disabled = false;
    }
  });

  // --- Admin users textarea ------------------------------------------------
  const adminUsersList = (cfg.admin_users || []).join('\n');
  const adminUsersIn = el('textarea', {rows: 3, placeholder: 'one email per line; empty = anyone with OS password is admin'}, adminUsersList);
  const adminUsersBtn = el('button', {type: 'button'}, 'Save admin users');
  adminUsersBtn.addEventListener('click', async () => {
    const users = adminUsersIn.value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    adminUsersBtn.disabled = true;
    try {
      const res = await api('POST', '/api/config/networking', {set_admin_users: true, admin_users: users});
      msg('ok', 'Admin users saved.');
      noteRestartPending(res);
    } catch (e) {
      msg('err', e.message || 'Save failed');
    } finally {
      adminUsersBtn.disabled = false;
    }
  });

  wrap.append(
    el('h3', {style: 'margin:1rem 0 0.4rem;font-size:1rem'}, 'Networking'),
    netForm,
    el('div', {style: 'margin-top:0.6rem'}, netBtn),
    el('p', {class: 'hint', style: 'margin-top:0.3rem'},
      'Leave a field empty to use the default shown as placeholder. ' +
      'admin_addr accepts 0.0.0.0:17777 for LAN binds (login always required).'),

    el('h3', {style: 'margin:1.2rem 0 0.4rem;font-size:1rem'}, 'Admin allowlist'),
    el('p', {class: 'hint'},
      'Emails listed here are treated as admin when authenticating via the host OS. ' +
      'Empty list = legacy behavior (anyone who proves the OS password is admin).'),
    adminUsersIn,
    el('div', {style: 'margin-top:0.4rem'}, adminUsersBtn),
  );
  return wrap;
}

// renderSuggestions populates a container with the auto-detected
// app candidates returned by /api/apps/suggestions. Each row has
// the human-friendly name, a hint with the discovery source/note,
// and either a one-click [Add] button (when not yet registered) or
// a "(already registered)" tag. Re-renders the page after a
// successful add so the new app appears in the list immediately.
function renderSuggestions(host, suggestions) {
  host.innerHTML = '';
  if (suggestions.length === 0) {
    host.append(el('p', {class: 'hint'}, 'No suggestions on this host.'));
    return;
  }
  for (const s of suggestions) {
    const row = el('div', {class: 'item-row'});
    const target = s.scheme === 'unix' || s.scheme === 'npipe'
      ? `${s.scheme}://${s.socket || ''}`
      : `${s.scheme || 'http'}://${s.host || '127.0.0.1'}:${s.port || ''}`;
    row.append(
      el('span', {class: 'label', style: 'min-width:9rem'}, s.name),
      el('span', {class: 'grow', style: 'font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:0.85em'}, target),
      el('span', {class: 'hint'}, s.note || s.source || ''),
    );
    if (s.existing) {
      row.append(el('span', {class: 'hint'}, '(already registered)'));
    } else {
      const addBtn = el('button', {type: 'button'}, 'Add');
      addBtn.addEventListener('click', async () => {
        addBtn.disabled = true;
        try {
          await api('POST', '/api/apps', {
            name: s.name,
            scheme: s.scheme,
            host: s.host || '',
            port: s.port || 0,
            socket: s.socket || '',
            enabled: true,
            require_login: false,
          });
          msg('ok', `Registered ${s.name}.`);
          render();
        } catch (e) {
          addBtn.disabled = false;
          msg('err', e.message || 'Add failed');
        }
      });
      row.append(addBtn);
    }
    host.append(row);
  }
}

// populateProvSubBlock fills a per-app sub-block with the
// provisioning bearer (reveal / copy / rotate) and a one-line help
// hint pointing at the relay URL. Called lazily on first chevron
// expand for SSO-enabled apps. Mirrors the MCP-credentials panel on
// the Pair tab — same reveal/mask/rotate affordances.
function populateProvSubBlock(parent, a) {
  const mask = t => t.replace(/./g, '•').slice(0, 16) + '…';
  const tokenSpan = el('code', {style: 'word-break:break-all'}, mask(a.provisioning_token));
  let revealed = false;
  const revealBtn = el('button', {type: 'button', class: 'secondary'}, 'Reveal');
  revealBtn.addEventListener('click', () => {
    revealed = !revealed;
    tokenSpan.textContent = revealed ? a.provisioning_token : mask(a.provisioning_token);
    revealBtn.textContent = revealed ? 'Hide' : 'Reveal';
  });
  const copyBtn = el('button', {type: 'button', class: 'secondary'}, 'Copy');
  copyBtn.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(a.provisioning_token); msg('ok', 'Token copied to clipboard.'); }
    catch (e) { msg('err', 'Copy failed: ' + (e.message || e)); }
  });
  const rotateBtn = el('button', {type: 'button', class: 'secondary danger'}, 'Rotate');
  rotateBtn.addEventListener('click', async () => {
    const ok = await confirmDialog({
      title: `Rotate provisioning token for "${a.name}"?`,
      description: 'The current token is invalidated immediately. Reconfigure the app with the new value.',
      confirmText: 'Rotate',
    });
    if (!ok) return;
    try {
      await api('POST', '/api/apps/' + encodeURIComponent(a.name) + '/provisioning-token/rotate');
      msg('ok', 'Token rotated.');
      render();
    } catch (e) { msg('err', e.message || 'Rotate failed'); }
  });
  const provURL = `${location.origin}/_periscope/apps/${encodeURIComponent(a.name)}/users`;
  parent.append(
    el('div', {class: 'item-row'},
      el('span', {class: 'hint'}, 'Provisioning bearer'),
      tokenSpan,
      revealBtn,
      copyBtn,
      rotateBtn,
    ),
    el('div', {style: 'opacity:0.65;font-size:0.85em;margin-top:0.2rem'},
      el('span', {class: 'hint'},
        'App POSTs to ', el('code', {}, provURL),
        ' with ', el('code', {}, 'Authorization: Bearer <token>'), ' to push new users.')),
  );
}

// buildSSHSubBlock populates the children that hide behind the SSH
// twister: -L / -R / -A toggles, the SFTP subsystem toggle, and the
// ssh_forward_sockets allowlist. All gate on cfg.ssh_enabled —
// they're inert in the daemon when SSH is off.
function buildSSHSubBlock(parent, cfg, status) {
  const sshOn = !!cfg.ssh_enabled;
  const rows = [
    {key: 'ssh_allow_local_forward',  fileKey: 'ssh_allow_local_forward',  label: 'SSH local port forwarding (-L)',  enabled: !!cfg.ssh_allow_local_forward},
    {key: 'ssh_allow_remote_forward', fileKey: 'ssh_allow_remote_forward', label: 'SSH remote port forwarding (-R)', enabled: !!cfg.ssh_allow_remote_forward},
    {key: 'ssh_allow_agent_forward',  fileKey: 'ssh_allow_agent_forward',  label: 'SSH agent forwarding (-A)',       enabled: !!cfg.ssh_allow_agent_forward},
    {key: 'sftp',                     fileKey: 'sftp_enabled',             label: 'SFTP subsystem (scp/sftp)',       enabled: !!cfg.sftp_enabled},
  ];
  for (const item of rows) {
    const row = el('div', {class: 'item-row' + (!sshOn ? ' dim' : '')});
    const sw = switchEl({checked: item.enabled && sshOn, disabled: !sshOn});
    sw.input.addEventListener('change', async () => {
      const newVal = sw.input.checked;
      sw.input.disabled = true;
      try {
        const res = await api('POST', '/api/config/builtins', {[item.key]: newVal});
        msg('ok', `${item.label} ${newVal ? 'on' : 'off'}.`);
        noteRestartPending(res);
      } catch (e) {
        sw.input.checked = !newVal;
        sw.input.disabled = false;
        msg('err', e.message || 'Save failed');
      }
    });
    row.append(
      sw.wrap,
      el('span', {class: 'label'}, item.label, ' ', el('code', {class: 'key-hint'}, item.fileKey)),
    );
    if (!sshOn) row.append(el('span', {class: 'hint'}, '(enable SSH first)'));
    parent.append(row);
  }

  // ssh_forward_sockets allowlist — a textarea, not a toggle.
  parent.append(el('h4', {}, 'Forward-sockets allowlist ', el('code', {class: 'key-hint'}, 'ssh_forward_sockets')));
  const sockHint = el('p', {class: 'hint', style: 'margin:0.1rem 0 0.3rem'},
    'Unix-socket paths to allow for direct-streamlocal forwards ' +
    '(podman --connection=, ssh -L localport:/remote.sock). ' +
    'Empty = the auto-detected podman/docker sockets only.');
  const sockInput = el('textarea', {
    rows: 3,
    placeholder: 'one socket path per line; empty = auto-detect',
    disabled: !sshOn,
    style: !sshOn ? 'opacity:0.6' : '',
  }, (cfg.ssh_forward_sockets || []).join('\n'));
  const sockBtn = el('button', {type: 'button', disabled: !sshOn}, 'Save forward-sockets');
  sockBtn.addEventListener('click', async () => {
    const sockets = sockInput.value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    sockBtn.disabled = true;
    try {
      const res = await api('POST', '/api/config/builtins', {ssh_forward_sockets: sockets});
      msg('ok', 'Forward-sockets saved.');
      noteRestartPending(res);
    } catch (e) {
      msg('err', e.message || 'Save failed');
    } finally {
      sockBtn.disabled = !sshOn;
    }
  });
  parent.append(sockHint, sockInput, el('div', {style: 'margin-top:0.4rem'}, sockBtn));
}

// buildPodmanSubBlock populates the children behind the Podman
// twister: cluster status banner + cluster toggle + kubeconfig YAML
// editor + node-name + Save/Save+Join/Leave buttons. The cluster
// toggle gates on having credentials pasted (has_token); the
// kubeconfig editor stays editable but the save buttons gate on
// cfg.podman_enabled — pasting a config with podman off doesn't
// help (the runner needs the local socket).
function buildPodmanSubBlock(parent, cfg, status) {
  const podmanOn = !!(cfg.podman && cfg.podman.enabled);
  const cv = cfg.cluster || {};

  // --- cluster status banner ----------------------------------------------
  parent.append(el('h4', {}, 'Cluster (virtual-kubelet → podman) ', el('code', {class: 'key-hint'}, 'cluster.enabled')));
  const banner = el('div', {class: 'item-row'});
  if (cv.has_token) {
    banner.append(el('span', {class: 'grow'},
      el('span', {}, 'Joined as '),
      el('code', {}, cv.node_name || '(unset)'),
      el('span', {}, ' → '),
      el('code', {}, cv.api_url || ''),
      el('span', {class: 'hint', style: 'margin-left:0.5rem'},
        cv.has_ca ? '(custom CA)' : '(system roots)')));
    const leave = el('button', {type: 'button'}, 'Leave cluster');
    leave.addEventListener('click', async () => {
      const ok = await confirmDialog({
        title: 'Leave cluster?',
        description: 'Clear cluster credentials and stop joining on next boot. This restarts the daemon.',
        confirmText: 'Leave',
      });
      if (!ok) return;
      leave.disabled = true;
      try {
        const res = await api('DELETE', '/api/cluster/kubeconfig');
        msg('ok', 'Cluster credentials cleared.');
        noteRestartPending(res);
      } catch (e) {
        leave.disabled = false;
        msg('err', e.message || 'Clear failed');
      }
    });
    banner.append(leave);
  } else if (cv.enabled) {
    banner.append(el('span', {class: 'grow hint'},
      'Enabled — outpost will fetch a kubeconfig from cloudbox on next start.'));
  } else {
    banner.append(el('span', {class: 'grow hint'},
      podmanOn ? 'Disabled. Toggle Cluster below to join (cloudbox auto-fetches a kubeconfig using the saved access_token).' :
                 'Disabled. Enable Podman first — cluster mode dials the local podman socket.'));
  }
  parent.append(banner);

  // --- cluster toggle row -------------------------------------------------
  // Opt-in / opt-out for the cloudbox-managed cluster. The daemon
  // auto-fetches a kubeconfig from cloudbox using the saved
  // access_token on the next boot after the toggle is flipped on, so
  // the only prerequisites are: podman daemon running locally (we
  // dial its socket) + host is paired with cloudbox (so the
  // access_token exists). Bring-your-own kubeconfig is no longer
  // supported in the SPA — operators with a third-party cluster
  // should pair a second outpost against the cloudbox managing it.
  const clusterRow = el('div', {class: 'item-row' + (!podmanOn ? ' dim' : '')});
  const clusterOn = !!(cv && cv.enabled);
  const paired = !!(status && status.configured);
  const clusterGateOK = podmanOn && paired;
  const csw = switchEl({checked: clusterOn && clusterGateOK, disabled: !clusterGateOK});
  csw.input.addEventListener('change', async () => {
    const newVal = csw.input.checked;
    csw.input.disabled = true;
    try {
      const res = await api('POST', '/api/config/builtins', {cluster: newVal});
      msg('ok', `Cluster ${newVal ? 'on' : 'off'}.`);
      noteRestartPending(res);
    } catch (e) {
      csw.input.checked = !newVal;
      csw.input.disabled = false;
      msg('err', e.message || 'Save failed');
    }
  });
  clusterRow.append(
    csw.wrap,
    el('span', {class: 'label'}, 'Join cluster ', el('code', {class: 'key-hint'}, 'cluster.enabled')),
  );
  if (!podmanOn) {
    clusterRow.append(el('span', {class: 'hint'}, '(enable Podman first)'));
  } else if (!paired) {
    clusterRow.append(el('span', {class: 'hint'}, '(pair this host first)'));
  } else {
    clusterRow.append(el('span', {class: 'hint'},
      'cloudbox auto-fetches a kubeconfig using the saved access_token on next boot. Token + CA never leave this machine.'));
  }
  parent.append(clusterRow);

  // --- kubectl readiness panel ------------------------------------------
  // Shown only when the cluster toggle is on. Pulls from
  // /api/cluster/user-kubeconfig (a small status doc: path, exists,
  // last_refresh, last_error). The Refresh button re-mints from
  // cloudbox and rewrites the file in place.
  if (clusterOn && paired) {
    const kubeBox = el('div', {style: 'margin-top:0.8rem;padding:0.6rem 0.8rem;border:1px solid #8884;border-radius:6px;background:rgba(37,99,235,0.06)'});
    const heading = el('div', {style: 'font-weight:600;margin-bottom:0.3rem'}, 'kubectl / helm');
    kubeBox.append(heading);
    const body = el('div', {});
    kubeBox.append(body);
    const refreshBtn = el('button', {type: 'button', style: 'margin-top:0.4rem'}, 'Refresh');

    async function loadKubeStatus(initial) {
      body.innerHTML = '';
      let st;
      try {
        st = await api('GET', '/api/cluster/user-kubeconfig');
      } catch (e) {
        body.append(el('p', {class: 'error'}, e.message || 'Failed to load kubeconfig status.'));
        return;
      }
      if (st.last_error) {
        body.append(el('p', {class: 'error'},
          'Last refresh failed: ' + st.last_error));
      } else if (st.exists) {
        body.append(el('p', {class: 'hint', style: 'margin:0'},
          'Ready. One-time shell setup:'));
        body.append(el('pre', {style: 'background:#0001;padding:0.4rem;border-radius:4px;font-size:0.85rem;overflow-x:auto;margin:0.3rem 0'},
          'export KUBECONFIG=' + st.path));
        body.append(el('p', {class: 'hint', style: 'margin:0.3rem 0 0'},
          'Then run ', el('code', {}, 'kubectl get nodes'), ' or ', el('code', {}, 'helm list -A'), '.'));
      } else if (initial) {
        body.append(el('p', {class: 'hint'},
          'Kubeconfig not on disk yet — click Refresh to fetch from cloudbox.'));
      } else {
        body.append(el('p', {class: 'error'},
          'Kubeconfig still missing after refresh. Check cloudbox cluster mode is enabled (CLUSTER_ENABLED=true).'));
      }
      const meta = el('p', {class: 'hint', style: 'margin:0.4rem 0 0;font-size:0.8rem'});
      const bits = [];
      if (st.path) bits.push(el('code', {}, st.path));
      if (st.api_url) bits.push('apiserver=' + st.api_url);
      if (st.node_name) bits.push('node=' + st.node_name);
      if (st.last_refresh) bits.push('refreshed ' + new Date(st.last_refresh).toLocaleString());
      for (let i = 0; i < bits.length; i++) {
        if (i > 0) meta.append(' · ');
        meta.append(bits[i]);
      }
      if (bits.length) body.append(meta);
    }

    refreshBtn.addEventListener('click', async () => {
      refreshBtn.disabled = true;
      try {
        await api('POST', '/api/cluster/user-kubeconfig/refresh', {});
        msg('ok', 'Kubeconfig refreshed.');
      } catch (e) {
        msg('err', e.message || 'Refresh failed');
      } finally {
        refreshBtn.disabled = false;
        loadKubeStatus(false);
      }
    });
    kubeBox.append(refreshBtn);
    parent.append(kubeBox);
    // Fire the initial load asynchronously so the rest of the panel
    // renders immediately.
    loadKubeStatus(true);
  }
}

// buildOllamaSubBlock populates the children behind the Ollama
// twister: the LLM-pool participation toggle plus (when the pool is
// running) the live watcher diagnostic. All Ollama-related state in
// one place — matches the SSH/Podman twister pattern.
function buildYcodeSubBlock(parent, cfg, status) {
  const y = cfg.ycode || {};

  // Share toggle — mirrors the ollama_pool pattern. Default on when
  // ycode itself is on (server returns ycode_share_enabled folding the
  // pointer-bool nil case to YcodeOn). Disabled when ycode is off
  // because the share is a strict extension of the per-host proxy.
  const shareRow = el('div', {class: 'item-row' + (!y.enabled ? ' dim' : '')});
  const sw = switchEl({checked: !!cfg.ycode_share_enabled && !!y.enabled, disabled: !y.enabled});
  sw.input.addEventListener('change', async () => {
    const newVal = sw.input.checked;
    sw.input.disabled = true;
    try {
      const res = await api('POST', '/api/config/builtins', {ycode_share: newVal});
      msg('ok', `ycode share ${newVal ? 'on' : 'off'}.`);
      noteRestartPending(res);
      sw.input.disabled = !y.enabled;
    } catch (e) {
      sw.input.checked = !newVal;
      sw.input.disabled = !y.enabled;
      msg('err', e.message || 'Save failed');
    }
  });
  shareRow.append(
    sw.wrap,
    el('span', {class: 'label'}, 'Share ycode UI via cloudbox ', el('code', {class: 'key-hint'}, 'ycode_share_enabled')),
  );
  if (!y.enabled) shareRow.append(el('span', {class: 'hint'}, '(enable ycode first)'));
  parent.append(shareRow);

  // Require-login toggle for the `ycode` app — mirrors the per-app
  // "require login" flag custom apps have. Default off (owner walks
  // in via cookie auth); flip on to make cloudbox demand OS-password
  // elevation the way /shell and /desktop do. Disabled when the share
  // itself is off because there'd be nothing to gate.
  const shareOn = !!cfg.ycode_share_enabled && !!y.enabled;
  const loginRow = el('div', {class: 'item-row' + (!shareOn ? ' dim' : '')});
  const lsw = switchEl({checked: !!cfg.ycode_share_require_login && shareOn, disabled: !shareOn});
  lsw.input.addEventListener('change', async () => {
    const newVal = lsw.input.checked;
    lsw.input.disabled = true;
    try {
      const res = await api('POST', '/api/config/builtins', {ycode_share_require_login: newVal});
      msg('ok', `ycode require-login ${newVal ? 'on' : 'off'}.`);
      noteRestartPending(res);
      lsw.input.disabled = !shareOn;
    } catch (e) {
      lsw.input.checked = !newVal;
      lsw.input.disabled = !shareOn;
      msg('err', e.message || 'Save failed');
    }
  });
  loginRow.append(
    lsw.wrap,
    el('span', {class: 'label'}, 'Require OS-password elevation ', el('code', {class: 'key-hint'}, 'ycode_share_require_login')),
  );
  if (!shareOn) loginRow.append(el('span', {class: 'hint'}, '(turn on Share ycode UI first)'));
  parent.append(loginRow);

  // Per-surface toggle checklist. The server hands us the catalog +
  // effective state as cfg.ycode_share_surfaces; we render one switch
  // row per entry. Operators flip canvas/ollama/git/memos/graph here.
  // The map_partial-merge admincore semantics mean each toggle POSTs
  // just its own key — other surfaces stay where they were.
  const surfaces = Array.isArray(cfg.ycode_share_surfaces) ? cfg.ycode_share_surfaces : [];
  if (surfaces.length > 0) {
    const surfBox = el('div', {style: 'margin-top:0.5rem;padding:0.5rem 0.7rem;border:1px solid #8884;border-radius:6px;background:#2563eb11;font-size:0.85rem;'});
    surfBox.append(el('div', {style: 'font-weight:600;margin-bottom:0.3rem'}, 'Surfaces'));
    for (const surf of surfaces) {
      const r = el('div', {class: 'item-row' + (!shareOn ? ' dim' : '')});
      const ssw = switchEl({checked: !!surf.enabled && shareOn, disabled: !shareOn});
      ssw.input.addEventListener('change', async () => {
        const newVal = ssw.input.checked;
        ssw.input.disabled = true;
        try {
          const res = await api('POST', '/api/config/builtins', {ycode_share_surfaces: {[surf.name]: newVal}});
          msg('ok', `${surf.label} ${newVal ? 'on' : 'off'}.`);
          noteRestartPending(res);
          ssw.input.disabled = !shareOn;
        } catch (e) {
          ssw.input.checked = !newVal;
          ssw.input.disabled = !shareOn;
          msg('err', e.message || 'Save failed');
        }
      });
      r.append(
        ssw.wrap,
        el('span', {class: 'label'}, surf.label, ' ', el('code', {class: 'key-hint'}, surf.name)),
      );
      surfBox.append(r);
    }
    surfBox.append(el('div', {class: 'hint', style: 'margin-top:0.4rem'},
      'Each surface becomes a tile at ',
      el('code', {class: 'key-hint'}, '/h/<host>/app/<name>/'),
      '. Operators pick which ones to expose.'));
    parent.append(surfBox);
  }

  const box = el('div', {style: 'margin-top:0.5rem;padding:0.5rem 0.7rem;border:1px solid #8884;border-radius:6px;background:#2563eb11;font-size:0.85rem;'});
  const grid = el('div', {style: 'display:grid;grid-template-columns:max-content 1fr;gap:0.2rem 0.75rem'});
  const kv = (k, v) => {
    grid.append(el('span', {style: 'opacity:0.7'}, k));
    grid.append(el('span', {style: 'font-family:ui-monospace,SFMono-Regular,Menlo,monospace'}, v || '—'));
  };
  const stateLabel = y.running ? 'running'
                    : y.installed ? 'installed (not running)'
                    : y.stale_manifest ? 'stale manifest (no live process)'
                    : !y.platform_supported ? 'not available for this OS/arch'
                    : 'not installed';
  kv('State', stateLabel);
  if (y.platform_supported) {
    kv('Binary', y.binary_path);
    if (y.api_endpoint) kv('Endpoint', y.api_endpoint);
    if (y.version) kv('Version', y.version);
  }
  box.append(grid);
  // Download link: shown when the platform is supported and the
  // binary isn't found. Always-visible "Get latest" link otherwise
  // for upgrade discoverability.
  if (y.download_url) {
    const linkText = (!y.installed && y.platform_supported) ? 'Download ycode' : 'Latest releases';
    box.append(
      el('div', {style: 'margin-top:0.5rem'},
        el('a', {href: y.download_url, target: '_blank', rel: 'noopener'}, linkText),
      ),
    );
  }
  if (!y.platform_supported) {
    box.append(el('div', {class: 'hint', style: 'margin-top:0.4rem'},
      'ycode hasn\'t shipped a binary for your OS+arch yet. Tracked: darwin/amd64 + windows/amd64 (need podman/buildah refactor upstream).'));
  } else if (y.enabled && !y.running && y.installed) {
    box.append(el('div', {class: 'hint', style: 'margin-top:0.4rem'},
      'ycode is installed but not running. The next outpost restart will start it.'));
  }
  parent.append(box);
}

function buildOllamaSubBlock(parent, cfg, status) {
  const ollamaOn = !!(cfg.ollama && cfg.ollama.enabled);
  const row = el('div', {class: 'item-row' + (!ollamaOn ? ' dim' : '')});
  const sw = switchEl({checked: !!cfg.ollama_pool_enabled && ollamaOn, disabled: !ollamaOn});
  sw.input.addEventListener('change', async () => {
    const newVal = sw.input.checked;
    sw.input.disabled = true;
    try {
      const res = await api('POST', '/api/config/builtins', {ollama_pool: newVal});
      msg('ok', `Ollama pool ${newVal ? 'on' : 'off'}.`);
      noteRestartPending(res);
    } catch (e) {
      sw.input.checked = !newVal;
      sw.input.disabled = false;
      msg('err', e.message || 'Save failed');
    }
  });
  row.append(
    sw.wrap,
    el('span', {class: 'label'}, 'Share Ollama with LLM pool ', el('code', {class: 'key-hint'}, 'ollama_pool_enabled')),
  );
  if (!ollamaOn) row.append(el('span', {class: 'hint'}, '(enable Ollama first)'));
  parent.append(row);

  // LLM pool diagnostic — render only when pool participation is
  // actually wired. Shows the watcher's last-push state + the live
  // in-flight counter so the operator can confirm cloudbox is
  // hearing from this outpost without log-spelunking. Moved here
  // from a standalone block beneath Built-ins so all Ollama state
  // lives behind one twister.
  const pool = cfg.llm_pool || {};
  if (pool.enabled) {
    const poolBox = el('div', {style: 'margin-top:0.6rem;padding:0.5rem 0.7rem;border:1px solid #8884;border-radius:6px;background:#2563eb11;font-size:0.85rem;'});
    poolBox.append(el('div', {style: 'font-weight:600;margin-bottom:0.3rem'}, 'Pool diagnostic'));
    const grid = el('div', {style: 'display:grid;grid-template-columns:max-content 1fr;gap:0.2rem 0.75rem'});
    const kv = (k, v) => {
      grid.append(el('span', {style: 'opacity:0.7'}, k));
      grid.append(el('span', {style: 'font-family:ui-monospace,SFMono-Regular,Menlo,monospace'}, v));
    };
    const ago = ts => {
      if (!ts || ts.startsWith('0001')) return '— (never)';
      const t = new Date(ts);
      const s = Math.max(0, Math.round((Date.now() - t.getTime()) / 1000));
      if (s < 60) return s + 's ago';
      if (s < 3600) return Math.round(s/60) + 'm ago';
      return Math.round(s/3600) + 'h ago';
    };
    kv('Watcher', pool.running ? 'running' : 'stopped');
    kv('Last push', ago(pool.last_push_at) + (pool.last_models != null ? ` (${pool.last_models} models)` : ''));
    kv('Pushes', String(pool.push_count || 0));
    if (pool.max_parallel) {
      kv('In flight', `${pool.in_flight || 0} / ${pool.max_parallel}`);
    }
    if (pool.last_error) {
      kv('Last error', pool.last_error);
    }
    if (pool.cloudbox_url) kv('Cloudbox', pool.cloudbox_url);
    if (pool.ollama_url)   kv('Ollama',   pool.ollama_url);
    poolBox.append(grid);
    parent.append(poolBox);
  }
}

// buildOtelSubBlock populates the children behind the OTel twister:
// the fleet-federation toggle plus a static list of the surfaces this
// outpost exposes when enabled. The surfaces are a thin reverse-proxy
// over ycode's embedded Prometheus / Alertmanager / VictoriaLogs /
// Jaeger / Perses stack — each becomes /h/<host>/app/otel-<surface>/
// through cloudbox, gated by the standard per-app matrix_elev cookie.
// The pool toggle mirrors ollama_pool semantics: opt-in to allow
// fleet-wide consumers (e.g. a dashboard deployed on the DKS cluster)
// to reach this host's data plane.
function buildOtelSubBlock(parent, cfg, status) {
  const otelOn = !!cfg.otel_enabled;
  const row = el('div', {class: 'item-row' + (!otelOn ? ' dim' : '')});
  const sw = switchEl({checked: !!cfg.otel_pool_enabled && otelOn, disabled: !otelOn});
  sw.input.addEventListener('change', async () => {
    const newVal = sw.input.checked;
    sw.input.disabled = true;
    try {
      const res = await api('POST', '/api/config/builtins', {otel_pool: newVal});
      msg('ok', `OTel pool ${newVal ? 'on' : 'off'}.`);
      noteRestartPending(res);
    } catch (e) {
      sw.input.checked = !newVal;
      sw.input.disabled = false;
      msg('err', e.message || 'Save failed');
    }
  });
  row.append(
    sw.wrap,
    el('span', {class: 'label'}, 'Share with fleet observability ', el('code', {class: 'key-hint'}, 'otel_pool_enabled')),
  );
  if (!otelOn) row.append(el('span', {class: 'hint'}, '(enable OTel first)'));
  parent.append(row);

  // Static surface list. Each row is one of the five sub-paths the
  // outpost exposes when OTel is on and ycode is running. Cloudbox URL
  // is templated only when the host is paired — pre-pairing the operator
  // sees the local path so they know what's being exposed.
  const cloudboxURL = (cfg.cloudbox_url || '').replace(/\/+$/, '');
  const agentName = cfg.agent_name || (status && status.agent_name) || '';
  const surfaces = [
    {name: 'otel-prometheus', desc: 'PromQL + remote_read + /federate'},
    {name: 'otel-logs',       desc: 'VictoriaLogs select + ingest'},
    {name: 'otel-alerts',     desc: 'Alertmanager API v2 + UI'},
    {name: 'otel-traces',     desc: 'Jaeger query'},
    {name: 'otel-dashboard',  desc: 'Perses dashboards'},
  ];
  const surfaceBox = el('div', {style: 'margin-top:0.6rem;padding:0.5rem 0.7rem;border:1px solid #8884;border-radius:6px;background:#2563eb11;font-size:0.85rem;'});
  surfaceBox.append(el('div', {style: 'font-weight:600;margin-bottom:0.3rem'}, 'Exposed surfaces'));
  const sg = el('div', {style: 'display:grid;grid-template-columns:max-content 1fr;gap:0.2rem 0.75rem'});
  for (const s of surfaces) {
    const target = (cloudboxURL && agentName)
      ? `${cloudboxURL}/h/${agentName}/app/${s.name}/`
      : `/app/${s.name}/`;
    sg.append(el('span', {style: 'font-family:ui-monospace,SFMono-Regular,Menlo,monospace'}, s.name));
    sg.append(el('span', {style: 'opacity:0.7'}, s.desc));
    sg.append(el('span', {}));
    sg.append(el('span', {style: 'font-family:ui-monospace,SFMono-Regular,Menlo,monospace;opacity:0.7;font-size:0.8rem'}, target));
  }
  surfaceBox.append(sg);
  surfaceBox.append(el('div', {class: 'hint', style: 'margin-top:0.4rem'},
    'Each surface is a reverse proxy onto ycode\'s embedded observability stack. ' +
    'Data plane lights up only when ycode is running.'));
  parent.append(surfaceBox);

  // Fleet observability — show the cluster-side push URLs cloudbox
  // provisioned for this outpost (populated at register time from the
  // Exchange response). When present, ycode's collector is expected to
  // remote_write metrics / push logs / OTLP-export traces to these URLs
  // through the tailscale overlay. Empty URLs mean the cluster
  // observability bundle isn't installed yet — render a hint pointing
  // at the AppStore.
  if (otelOn) {
    const cv = cfg.cluster || {};
    const remotes = [
      {key: 'metrics_remote_url', label: 'Metrics → VictoriaMetrics', url: cv.metrics_remote_url},
      {key: 'logs_remote_url',    label: 'Logs → VictoriaLogs',       url: cv.logs_remote_url},
      {key: 'traces_remote_url',  label: 'Traces → Jaeger',           url: cv.traces_remote_url},
    ];
    const anyConfigured = remotes.some(r => !!r.url);
    const remoteBox = el('div', {style: 'margin-top:0.6rem;padding:0.5rem 0.7rem;border:1px solid #8884;border-radius:6px;background:#2563eb11;font-size:0.85rem;'});
    remoteBox.append(el('div', {style: 'font-weight:600;margin-bottom:0.3rem'}, 'Fleet aggregation (cluster push targets)'));
    if (anyConfigured) {
      const rg = el('div', {style: 'display:grid;grid-template-columns:max-content 1fr;gap:0.2rem 0.75rem'});
      for (const r of remotes) {
        rg.append(el('span', {style: 'opacity:0.7'}, r.label));
        rg.append(el('span', {style: 'font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:0.8rem'}, r.url || '—'));
      }
      remoteBox.append(rg);
      remoteBox.append(el('div', {class: 'hint', style: 'margin-top:0.4rem'},
        'ycode\'s collector remote_writes here through the tailscale overlay. Perses on the cluster reads from the same store.'));
    } else {
      remoteBox.append(el('div', {class: 'hint'},
        'No cluster observability stack registered yet. Install the observability bundle from cloudbox\'s AppStore and re-pair this outpost to receive push URLs.'));
    }
    parent.append(remoteBox);
  }
}

// fmtDuration renders ms-since as a tight human label
// ("2h13m", "47s", "3d4h"). Used by the Update tab's
// "installed ... ago" + "running ... ago" lines.
function fmtDuration(ms) {
  if (!Number.isFinite(ms) || ms < 0) return '';
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return `${sec}s`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60);
  if (hr < 24) {
    const rem = min - hr * 60;
    return rem ? `${hr}h${rem}m` : `${hr}h`;
  }
  const day = Math.floor(hr / 24);
  const remHr = hr - day * 24;
  return remHr ? `${day}d${remHr}h` : `${day}d`;
}

// fmtBytes renders a byte count as MB/KB/B for the Update tab's
// "binary size" row.
function fmtBytes(n) {
  if (!Number.isFinite(n) || n <= 0) return '';
  if (n >= 1024 * 1024) return `${(n / (1024 * 1024)).toFixed(1)} MB`;
  if (n >= 1024) return `${(n / 1024).toFixed(1)} KB`;
  return `${n} B`;
}

// fmtTimestamp renders an ISO date as "YYYY-MM-DD HH:MM:SS local
// (Nd Nh ago)". Returns empty for missing / zero-ish input — skips
// the Go zero-time ("0001-01-01T00:00:00Z") so legacy data doesn't
// render as nonsense.
function fmtTimestamp(s) {
  if (!s) return '';
  const d = new Date(s);
  if (Number.isNaN(d.getTime())) return '';
  if (d.getUTCFullYear() < 2000) return '';
  const pad = (n) => String(n).padStart(2, '0');
  const abs = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  const since = fmtDuration(Date.now() - d.getTime());
  return since ? `${abs} (${since} ago)` : abs;
}

// buildUpdateSection populates the Update tab. One fetch to
// /api/upgrade gets everything we render — build info, source, the
// update_mode selector, the pending envelope (if any), the recent
// ledger, and the rollback availability flag. The panel re-renders
// in place when the operator triggers an action so the visible state
// stays fresh without a full SPA reload.
async function buildUpdateSection(parent) {
  parent.innerHTML = '';
  let data;
  try {
    data = await api('GET', '/api/upgrade');
  } catch (e) {
    parent.append(el('p', {class: 'error'}, e.message || 'Failed to load upgrade overview.'));
    return;
  }
  const b = data.build || {};

  // === Current build ============================================
  const build = el('fieldset', {});
  build.append(el('legend', {}, 'Current build'));
  const buildList = el('div', {class: 'item-list'});
  const buildRow = (label, value, mono) => {
    if (!value) return;
    const row = el('div', {class: 'item-row'});
    row.append(
      el('span', {class: 'label', style: 'min-width:160px'}, label),
      el('span', {class: mono ? 'hint font-mono' : 'hint', style: 'font-family:monospace;font-size:0.85rem;word-break:break-all'}, String(value)),
    );
    buildList.append(row);
  };
  // Prefer the semver tag when present + clean working tree
  const versionLabel = (b.version && !b.dirty) ? b.version : (b.dirty ? `${(b.commit||'').slice(0,7)}-dirty` : (b.commit||'').slice(0,7) || 'unknown');
  buildRow('Version', versionLabel, true);
  buildRow('Commit (full)', b.commit, true);
  buildRow('Built at', fmtTimestamp(b.vcs_time), true);
  buildRow('Go version', b.go_version, true);
  buildRow('OS', b.os_version ? `${b.os_version} (${b.os}/${b.arch})` : `${b.os||''}/${b.arch||''}`, true);
  buildRow('Binary path', data.binary_path, true);
  buildRow('Binary size', fmtBytes(b.binary_size), true);
  buildRow('Installed at', fmtTimestamp(b.installed_at), true);
  buildRow('Daemon running since', fmtTimestamp(b.daemon_started_at), true);
  build.append(buildList);

  // === Source ==================================================
  const src = el('fieldset', {});
  src.append(el('legend', {}, 'Source'));
  const sl = el('div', {class: 'item-list'});
  if (data.current_source) {
    const cs = data.current_source;
    const kindLabel = ({
      'cloudbox': 'cloudbox push (GitHub release)',
      'cli-local': 'CLI install (`outpost upgrade --local`)',
      'cli-url': 'CLI install (`outpost upgrade --from URL`)',
      'manual':   'manual install (binary replaced out-of-band since the last tracked swap)',
      'unknown':  'unknown (no matching received entry in ledger)',
    })[cs.kind] || cs.kind;
    buildRowInto(sl, 'Origin', kindLabel);
    if (cs.url) {
      const link = el('a', {href: cs.url, target: '_blank', rel: 'noopener', style: 'word-break:break-all'}, cs.url);
      const row = el('div', {class: 'item-row'});
      row.append(el('span', {class: 'label', style: 'min-width:160px'}, 'Download URL'), link);
      sl.append(row);
    }
    if (cs.release_id) buildRowInto(sl, 'Release tag', cs.release_id);
    if (cs.at) buildRowInto(sl, 'Swapped at', fmtTimestamp(cs.at));
  } else {
    sl.append(el('p', {class: 'hint'}, 'No upgrade has ever run on this host — current binary was installed manually (scp / installer / package).'));
  }
  src.append(sl);

  // === Update policy ============================================
  const policy = el('fieldset', {});
  policy.append(el('legend', {}, 'Update policy'));
  const updateRow = el('div', {class: 'item-row'});
  const updateSelect = el('select', {style: 'min-width:120px'});
  const currentMode = data.update_mode || 'auto';
  for (const opt of [
    {v: 'auto',   label: 'Auto',   desc: 'apply cloudbox pushes immediately'},
    {v: 'manual', label: 'Manual', desc: 'persist envelope; operator clicks Apply (here or in cloudbox)'},
    {v: 'never',  label: 'Never',  desc: 'refuse all cloudbox pushes'},
  ]) {
    const o = el('option', {value: opt.v, title: opt.desc}, opt.label);
    if (opt.v === currentMode) o.selected = true;
    updateSelect.append(o);
  }
  updateSelect.addEventListener('change', async () => {
    const newVal = updateSelect.value;
    updateSelect.disabled = true;
    try {
      await api('POST', '/api/config/builtins', {update_mode: newVal});
      msg('ok', `Update mode → ${newVal}`);
    } catch (e) {
      updateSelect.value = currentMode;
      msg('err', e.message || 'Save failed');
    } finally { updateSelect.disabled = false; }
  });
  updateRow.append(
    el('span', {class: 'label', style: 'min-width:160px'},
      'Cloudbox-pushed self-upgrades ',
      el('code', {class: 'key-hint'}, 'update_mode'),
    ),
    updateSelect,
  );
  policy.append(updateRow);
  policy.append(el('p', {class: 'hint', style: 'margin-top:0.5rem'},
    'Live: re-read on every cloudbox push without restarting the daemon.'));

  // === Pending upgrade ==========================================
  if (data.pending) {
    const pend = el('fieldset', {});
    pend.append(el('legend', {}, 'Pending upgrade (manual mode)'));
    const pl = el('div', {class: 'item-list'});
    const env = data.pending;
    buildRowInto(pl, 'Release tag', env.release_id);
    buildRowInto(pl, 'Commit', (env.commit||'').slice(0,12));
    if (env.url) {
      const link = el('a', {href: env.url, target: '_blank', rel: 'noopener', style: 'word-break:break-all'}, env.url);
      const r = el('div', {class: 'item-row'});
      r.append(el('span', {class: 'label', style: 'min-width:160px'}, 'Download URL'), link);
      pl.append(r);
    }
    const applyBtn = el('button', {type: 'button'}, 'Apply now');
    applyBtn.addEventListener('click', async () => {
      if (!confirm(`Apply ${env.release_id}? The daemon will swap + restart.`)) return;
      applyBtn.disabled = true;
      try {
        const r = await api('POST', '/api/upgrade/apply', {});
        msg('ok', `Apply: ${r.status || 'queued'} — restarting…`);
        pollUntilUp();
        setTimeout(() => buildUpdateSection(parent), 4000);
      } catch (e) {
        msg('err', e.message || 'Apply failed');
        applyBtn.disabled = false;
      }
    });
    pl.append(el('div', {style: 'margin-top:0.4rem'}, applyBtn));
    pend.append(pl);
    parent.append(build, src, policy, pend);
  } else {
    parent.append(build, src, policy);
  }

  // === Rollback ================================================
  if (data.rollback_available) {
    const rb = el('fieldset', {});
    rb.append(el('legend', {}, 'Rollback'));
    rb.append(el('p', {class: 'hint'},
      el('code', {style: 'font-family:monospace'}, (data.binary_path || 'outpost') + '.previous'),
      ' is on disk — clicking Rollback restores it over the running binary and re-execs.'));
    const rbBtn = el('button', {type: 'button'}, 'Roll back');
    rbBtn.addEventListener('click', async () => {
      if (!confirm('Roll back to the previous outpost binary? The daemon will restart.')) return;
      rbBtn.disabled = true;
      try {
        const r = await api('POST', '/api/upgrade/rollback', {});
        if (r.status === '' || !r.status) {
          msg('ok', `Rolled back: ${r.from_commit||''} → ${r.to_commit||''}`);
        } else {
          msg('warn', `Rollback: ${r.status} — ${r.detail||''}`);
        }
        pollUntilUp();
        setTimeout(() => buildUpdateSection(parent), 4000);
      } catch (e) {
        msg('err', e.message || 'Rollback failed');
        rbBtn.disabled = false;
      }
    });
    rb.append(el('div', {style: 'margin-top:0.4rem'}, rbBtn));
    parent.append(rb);
  }

  // === History ================================================
  if (data.history && data.history.length > 0) {
    const hist = el('fieldset', {});
    hist.append(el('legend', {}, 'Recent history'));
    const det = el('details');
    det.append(el('summary', {style: 'cursor:pointer;font-size:0.9rem'}, `${data.history.length} ledger entries`));
    const tbl = el('table', {style: 'font-size:0.8rem;margin-top:0.4rem;font-family:monospace'});
    const thead = el('thead', {});
    thead.append(el('tr', {}, ...['When', 'Release', 'Step', 'From', 'To', 'Detail'].map(h => el('th', {style: 'text-align:left;padding:0.2rem 0.5rem;border-bottom:1px solid #8884'}, h))));
    tbl.append(thead);
    const tbody = el('tbody', {});
    // newest first
    for (const e of [...data.history].reverse()) {
      const at = e.at ? new Date(e.at) : null;
      const atStr = at ? `${at.getFullYear()}-${String(at.getMonth()+1).padStart(2,'0')}-${String(at.getDate()).padStart(2,'0')} ${String(at.getHours()).padStart(2,'0')}:${String(at.getMinutes()).padStart(2,'0')}` : '';
      const td = (v) => el('td', {style: 'padding:0.2rem 0.5rem;border-bottom:1px solid #8881'}, v||'');
      const stepCell = el('td', {style: `padding:0.2rem 0.5rem;border-bottom:1px solid #8881;color:${(e.step||'').includes('failed')?'#dc2626':(e.step==='swap_done'||e.step==='rollback')?'#16a34a':'inherit'}`}, e.step||'');
      const detail = e.error ? `ERR: ${e.error}` : (e.detail||'');
      const tr = el('tr', {}, td(atStr), td(e.release_id||''), stepCell, td((e.from_sha||'').slice(0,8)), td((e.to_sha||'').slice(0,8)), td(detail));
      tbody.append(tr);
    }
    tbl.append(tbody);
    det.append(tbl);
    hist.append(det);
    parent.append(hist);
  }
}

// buildRowInto — small helper for buildUpdateSection's many label/value
// rows. Just keeps the inline DOM construction tidy.
function buildRowInto(parent, label, value) {
  if (!value) return;
  const row = el('div', {class: 'item-row'});
  row.append(
    el('span', {class: 'label', style: 'min-width:160px'}, label),
    el('span', {class: 'hint', style: 'font-family:monospace;font-size:0.85rem;word-break:break-all'}, String(value)),
  );
  parent.append(row);
}

// daemonSourceLabel — for the agentic-platform card. Returns "via ycode"
// when the detected daemon target resolves under ycode's per-user tree
// (~/.agents/ycode/...) and "standalone" otherwise. ycode publishes its
// embedded podman socket under that prefix (see
// internal/agent/builtin_apps.go:46-48); the same heuristic will catch
// a future ycode-managed Ollama if/when ycode advertises one in its
// manifest. Returns "" when the daemon isn't reachable so the row can
// keep its existing "(not available)" hint instead.
function daemonSourceLabel(target) {
  if (!target) return '';
  return target.includes('/.agents/ycode/') ? 'via ycode' : 'standalone';
}

// renderBuiltinRows — shared loop for the "Built-in apps" and
// "Agentic platform" fieldsets. Each item is one of:
//   - core toggle: {key, fileKey, label, enabled, subBlock?}
//   - daemon proxy: {key, fileKey, label, daemon: BuiltinView, subBlock?}
//   - ycode supervisor: {key, fileKey, label, ycode: YcodeView, subBlock?}
//   - placeholder: {placeholder: true, label, hint} — renders permanently
//     dim with a disabled switch; no POST fires when clicked. Used for
//     the OTel "coming soon" slot.
function renderBuiltinRows(parent, items, cfg, status) {
  for (const item of items) {
    if (item.placeholder) {
      const row = el('div', {class: 'item-row dim'});
      const sw = switchEl({checked: false, disabled: true});
      row.append(
        sw.wrap,
        el('span', {class: 'label'}, item.label),
        el('span', {class: 'hint'}, item.hint || ''),
      );
      parent.append(row);
      continue;
    }
    const isDaemon = !!item.daemon;
    const isYcode  = !!item.ycode;
    // gatedBy: the row mirrors another built-in's enablement (e.g. the
    // Ollama-pool toggle only makes sense when Ollama itself is on).
    // Treated as a daemon-like disabled state so the visual cue is
    // consistent.
    const isGated = !!item.gatedBy;
    const gateOK = !isGated || !!item.gatedBy.enabled;
    const enabled = isDaemon ? !!item.daemon.enabled
