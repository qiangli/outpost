<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>outpost admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light dark; font-family: system-ui, -apple-system, sans-serif; }
  body { margin: 0; padding: 2rem; max-width: 720px; }
  h1 { margin-top: 0; font-size: 1.4rem; }
  h2 { font-size: 1.05rem; margin-top: 1.8rem; }
  fieldset { border: 1px solid #ccc4; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
  legend { padding: 0 0.4rem; font-weight: 600; }
  label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; }
  label > input:not([type=checkbox]), label > select { display: block; margin-top: 0.2rem; }
  /* Checkbox-bearing labels: keep the box inline with its caption text. */
  label.check { display: flex; align-items: center; gap: 0.4rem; }
  input[type=text], input[type=password], input[type=url], input[type=number], select {
    padding: 0.4rem; border: 1px solid #8884; border-radius: 4px; width: 100%; box-sizing: border-box;
  }
  button { padding: 0.5rem 0.9rem; border: 0; border-radius: 4px; cursor: pointer;
           background: #2563eb; color: white; font-weight: 600; }
  button.secondary { background: transparent; color: inherit; border: 1px solid #8888; }
  button.danger { background: #b91c1c; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .row { display: flex; gap: 0.5rem; align-items: end; }
  .row > * { flex: 1; }
  .row > button { flex: 0 0 auto; }
  .msg { padding: 0.5rem 0.7rem; border-radius: 4px; margin-bottom: 0.7rem; }
  .msg.ok  { background: #16a34a22; }
  .msg.err { background: #dc262622; color: #fca5a5; border-left: 3px solid #dc2626; }
  /* Modal dialog used for outbound Connect (replaces the native prompt). */
  dialog.auth-dialog { background: #1a1d23; color: inherit; border: 1px solid #8884;
                       border-radius: 8px; padding: 1.2rem 1.4rem;
                       min-width: 340px; max-width: 90vw;
                       color-scheme: dark; }
  dialog.auth-dialog::backdrop { background: rgba(0,0,0,0.55); }
  dialog.auth-dialog h2 { margin: 0 0 0.4rem; font-size: 1.05rem; }
  dialog.auth-dialog p  { margin: 0 0 0.8rem; font-size: 0.85rem; opacity: 0.8; }
  dialog.auth-dialog form { display: flex; flex-direction: column; gap: 0.7rem; }
  dialog.auth-dialog .dialog-error { color: #fca5a5; font-size: 0.85rem;
                                     min-height: 1rem; font-weight: 600; }
  dialog.auth-dialog .actions { display: flex; gap: 0.5rem; justify-content: flex-end;
                                margin-top: 0.4rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
  th, td { text-align: left; padding: 0.4rem; border-bottom: 1px solid #8882; font-size: 0.9rem; }
  .pill { display: inline-block; padding: 0 0.4rem; border-radius: 999px; font-size: 0.75rem;
          background: #2563eb22; }
  .pill.off { background: #8884; }
  .toggle-row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .toggle-row label { display: flex; align-items: center; gap: 0.4rem; }
  .toggle-row label.disabled { opacity: 0.55; }
  .hint { font-size: 0.75rem; opacity: 0.7; margin-left: 0.4rem; }
  /* iOS-style toggle switch wrapping a hidden checkbox. */
  .switch { position: relative; display: inline-block; width: 36px; height: 20px; flex: 0 0 auto; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; inset: 0; background: #8884; border-radius: 999px;
                    cursor: pointer; transition: background .15s; }
  .switch .slider::before { content: ''; position: absolute; left: 2px; top: 2px;
                             width: 16px; height: 16px; background: white; border-radius: 50%;
                             transition: transform .15s; }
  .switch input:checked + .slider { background: #2563eb; }
  .switch input:checked + .slider::before { transform: translateX(16px); }
  .switch input:disabled + .slider { opacity: 0.45; cursor: not-allowed; }
  /* Vertical lists for built-ins and apps (one row per item). */
  .item-list { display: flex; flex-direction: column; gap: 0; }
  .item-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0;
              border-bottom: 1px solid #8882; }
  .item-row:last-child { border-bottom: 0; }
  .item-row.dim { opacity: 0.55; }
  .item-row.stacked { flex-direction: column; align-items: stretch; gap: 0.35rem; }
  .item-row.stacked .line { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .item-row .grow { flex: 1; min-width: 0; }
  .item-row .label { font-weight: 600; min-width: 7rem; }
  .item-row a { color: #2563eb; text-decoration: none; word-break: break-all; }
  .item-row a:hover { text-decoration: underline; }
  /* Header: title left, action buttons right, on one line. */
  header.app-header { display: flex; justify-content: space-between; align-items: center;
                       margin-bottom: 1rem; gap: 1rem; flex-wrap: wrap; }
  header.app-header h1 { margin: 0; display: flex; align-items: center; gap: 0.6rem; }
  header.app-header .actions { display: flex; gap: 0.5rem; }
  .login-form { max-width: 320px; }
  /* Section-group heading — Inbound, Outbound. Renders heavier than the
     fieldset legends below it so the grouping reads as the dominant
     hierarchy. */
  .section-head { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.04em;
                  text-transform: uppercase; opacity: 0.75;
                  margin: 1.6rem 0 0.4rem; }
  /* Tab bar — Pair host / Inbound / Outbound. Active tab gets a blue
     underline; inactive tabs dim. Panels stack but only the active one
     is visible. */
  .tabs { display: flex; gap: 0.25rem; border-bottom: 1px solid #8884;
          margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { background: transparent; color: inherit; border: 0;
         border-bottom: 2px solid transparent; padding: 0.55rem 1.1rem;
         font-weight: 600; cursor: pointer; opacity: 0.6;
         font-size: 0.95rem; }
  .tab:hover { opacity: 0.9; }
  .tab.active { opacity: 1; border-bottom-color: #2563eb; }
  .tab-panel.hidden { display: none; }
</style>
</head>
<body>
<header class="app-header">
  <h1>outpost admin</h1>
  <div id="header-actions" class="actions"></div>
</header>
<div id="msg-host"></div>
<div id="app">Loading…</div>

<script>
const $ = sel => document.querySelector(sel);
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v === false || v == null) {} else n.setAttribute(k, v === true ? '' : v);
  }
  for (const k of kids.flat()) n.append(k && k.nodeType ? k : document.createTextNode(k == null ? '' : k));
  return n;
};

// coinLogo — the DHNT.io / Cloudbox mark, ported from cloudbox's
// CoinLogo React component (ui/src/components/coin-logo.tsx). Inline
// SVG so the admin UI stays a single self-contained file. Each call
// uses a fresh gradient id so multiple coins on one page render
// correctly.
let coinIdCounter = 0;
function coinLogo(size = 28, holeColor = 'transparent') {
  const id = 'coin-grad-' + (coinIdCounter++);
  const wrap = document.createElement('span');
  wrap.style.display = 'inline-flex';
  wrap.style.alignItems = 'center';
  wrap.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 100 100" aria-label="DHNT.io Cloudbox" role="img">
    <defs>
      <radialGradient id="${id}" cx="40%" cy="35%" r="70%">
        <stop offset="0%" stop-color="#fafbfd"/>
        <stop offset="45%" stop-color="#c2c8d1"/>
        <stop offset="80%" stop-color="#7c8590"/>
        <stop offset="100%" stop-color="#3e4651"/>
      </radialGradient>
    </defs>
    <circle cx="50" cy="50" r="47" fill="url(#${id})" stroke="#3a4250" stroke-width="0.8"/>
    <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.6"/>
    <rect x="33" y="33" width="34" height="34" fill="none" stroke="#3a4250" stroke-width="1.6"/>
    <rect x="40" y="40" width="20" height="20" fill="${holeColor}"/>
  </svg>`;
  return wrap.firstElementChild;
}

// passwordDialog renders a modal asking for a password and runs the
// caller-supplied onSubmit(password) when the user submits. If onSubmit
// throws, the dialog stays open and shows the error message in red
// instead of dismissing — so the operator can correct a typo without
// retyping the form. Resolves with true on success, false on cancel.
function passwordDialog({title, description, submitText = 'Connect', onSubmit}) {
  return new Promise((resolve) => {
    const dlg = document.createElement('dialog');
    dlg.className = 'auth-dialog';
    const form = el('form', {},
      el('h2', {}, title),
      description ? el('p', {}, description) : '',
      el('label', {}, 'Password',
        el('input', {type: 'password', name: 'password', autocomplete: 'current-password', required: true})),
      el('div', {class: 'dialog-error'}, ''),
      el('div', {class: 'actions'},
        el('button', {type: 'button', class: 'secondary cancel'}, 'Cancel'),
        el('button', {type: 'submit', class: 'submit'}, submitText),
      ),
    );
    dlg.append(form);
    document.body.append(dlg);
    const input = dlg.querySelector('input');
    const errEl = dlg.querySelector('.dialog-error');
    const cancelBtn = dlg.querySelector('.cancel');
    const submitBtn = dlg.querySelector('.submit');

    const close = (ok) => { dlg.close(); dlg.remove(); resolve(ok); };
    cancelBtn.addEventListener('click', () => close(false));
    dlg.addEventListener('cancel', (ev) => { ev.preventDefault(); close(false); });
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      errEl.textContent = '';
      submitBtn.disabled = true;
      try {
        await onSubmit(input.value);
        close(true);
      } catch (e) {
        errEl.textContent = e.message || 'Failed';
        submitBtn.disabled = false;
        input.select();
      }
    });

    dlg.showModal();
    setTimeout(() => input.focus(), 0);
  });
}

// switchEl builds an iOS-style toggle: a hidden checkbox + a styled span.
// Returns {wrap, input} so callers can attach a listener to the input.
function switchEl(props={}) {
  const wrap = document.createElement('label');
  wrap.className = 'switch';
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  if (props.checked) inp.checked = true;
  if (props.disabled) inp.disabled = true;
  const slider = document.createElement('span');
  slider.className = 'slider';
  wrap.append(inp, slider);
  return {wrap, input: inp};
}

function msg(kind, text) {
  const host = $('#msg-host');
  host.innerHTML = '';
  host.append(el('div', {class: 'msg ' + kind}, text));
  if (kind === 'ok') setTimeout(() => { host.innerHTML = ''; }, 4000);
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(path, opts);
  let data = {};
  try { data = await resp.json(); } catch (_) {}
  if (!resp.ok) {
    const err = new Error(data.error || resp.statusText);
    err.status = resp.status;
    throw err;
  }
  return data;
}

async function render() {
  let status;
  try {
    status = await api('GET', '/api/status');
  } catch (e) {
    if (e.status === 401) return renderLogin();
    return renderFatal(e);
  }
  let cfg;
  try {
    cfg = await api('GET', '/api/config');
  } catch (e) {
    if (e.status === 401) return renderLogin();
    return renderFatal(e);
  }
  renderMain(status, cfg);
}

function renderFatal(e) {
  $('#app').innerHTML = '';
  $('#app').append(el('div', {class: 'msg err'}, 'Failed to load: ' + (e.message || e)));
}

function renderLogin() {
  const app = $('#app');
  app.innerHTML = '';
  // No Restart/Sign out before login.
  const ha = $('#header-actions');
  if (ha) ha.innerHTML = '';
  const form = el('form', {class: 'login-form'});
  form.append(
    el('h2', {}, 'Sign in with your OS password'),
    el('label', {}, 'Username',
      el('input', {type: 'text', name: 'user', autocomplete: 'username'})),
    el('label', {}, 'Password',
      el('input', {type: 'password', name: 'password', autocomplete: 'current-password'})),
    el('button', {type: 'submit'}, 'Sign in'),
  );
  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(form);
    try {
      await api('POST', '/api/login', { user: fd.get('user'), password: fd.get('password') });
      msg('ok', 'Signed in');
      render();
    } catch (e) {
      msg('err', e.message || 'Login failed');
    }
  });
  app.append(form);
  // Prefill the username with the running OS user if we can guess.
  api('GET', '/api/status').then(s => {
    if (s.current_os_user) form.querySelector('input[name=user]').value = s.current_os_user;
  }).catch(() => {});
}

// activeTab is persisted across renders so a save-triggered re-render
// doesn't kick the user back to the default tab. Keys: 'pair', 'inbound',
// 'outbound'.
const TAB_KEY = 'outpost.activeTab';

function renderMain(status, cfg) {
  const app = $('#app');
  app.innerHTML = '';

  // Tab bar + three panels. Pairing → "Pair host", Built-in + Custom →
  // "Inbound", outbound mounts → "Outbound".
  const tabs = el('div', {class: 'tabs'});
  const panels = el('div', {class: 'tab-panels'});
  const panelPair = el('div', {class: 'tab-panel', 'data-panel': 'pair'});
  const panelInbound = el('div', {class: 'tab-panel', 'data-panel': 'inbound'});
  const panelOutbound = el('div', {class: 'tab-panel', 'data-panel': 'outbound'});
  panels.append(panelPair, panelInbound, panelOutbound);

  // Initial tab: stored preference if any, else 'inbound' when paired
  // (the common case), else 'pair' (operator needs to finish setup).
  let active = localStorage.getItem(TAB_KEY);
  if (!['pair', 'inbound', 'outbound'].includes(active)) {
    active = status.configured ? 'inbound' : 'pair';
  }
  const tabDefs = [
    ['pair', 'Pair host'],
    ['inbound', 'Inbound'],
    ['outbound', 'Outbound'],
  ];
  const tabBtns = {};
  for (const [key, label] of tabDefs) {
    const b = el('button', {type: 'button', class: 'tab' + (key === active ? ' active' : ''),
                            onclick: () => activate(key)}, label);
    tabBtns[key] = b;
    tabs.append(b);
  }
  function activate(key) {
    for (const [k] of tabDefs) {
      tabBtns[k].classList.toggle('active', k === key);
    }
    panelPair.classList.toggle('hidden', key !== 'pair');
    panelInbound.classList.toggle('hidden', key !== 'inbound');
    panelOutbound.classList.toggle('hidden', key !== 'outbound');
    try { localStorage.setItem(TAB_KEY, key); } catch (_) {}
  }
  activate(active);

  app.append(tabs, panels);

  // Pairing section
  const pairing = el('fieldset', {});
  pairing.append(el('legend', {}, 'Pair host'));
  if (status.configured) {
    pairing.append(el('p', {}, 'Currently paired as ', el('strong', {}, status.agent_name),
      ' on ', el('code', {}, status.server_addr || '(unknown)'), '.'));
  } else {
    pairing.append(el('p', {}, 'Not yet paired. Get a one-time code from the portal.'));
  }
  const pf = el('form', {});
  pf.append(
    el('label', {}, 'Portal URL',
      el('input', {type: 'url', name: 'server', value: cfg.server_addr ? '' : (cfg.defaults.server_url || '')})),
    el('label', {}, 'Pairing code',
      el('input', {type: 'text', name: 'code', autocomplete: 'off', required: true})),
    el('label', {}, 'Host name',
      el('input', {type: 'text', name: 'name', value: cfg.agent_name || cfg.defaults.name || '', required: true})),
    el('label', {}, 'Subtitle (optional, required if auth URL is set)',
      el('input', {type: 'text', name: 'title'})),
    el('label', {}, 'Custom auth URL (advanced)',
      el('input', {type: 'url', name: 'auth_url', value: cfg.auth_url || ''})),
    el('button', {type: 'submit'}, 'Save & restart'),
  );
  pf.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(pf);
    const btn = pf.querySelector('button');
    btn.disabled = true;
    try {
      await api('POST', '/api/config/register', {
        server: (fd.get('server') || cfg.defaults.server_url || '').toString().trim(),
        code: fd.get('code'),
        name: fd.get('name'),
        title: fd.get('title'),
        auth_url: fd.get('auth_url'),
      });
      msg('ok', 'Saved. Restarting outpost — refresh in a few seconds.');
      pollUntilUp();
    } catch (e) {
      btn.disabled = false;
      msg('err', e.message || 'Pairing failed');
    }
  });
  pairing.append(pf);
  panelPair.append(pairing);

  // Built-in apps section — one per line, toggle switches, auto-save on
  // change (no separate Save button). Each flip POSTs the single changed
  // field; the server's debounced restart collapses rapid flips into one
  // restart.
  const built = el('fieldset', {});
  built.append(el('legend', {}, 'Built-in apps'));
  const builtList = el('div', {class: 'item-list'});

  const builtinRows = [
    {key: 'shell', label: 'Shell', enabled: cfg.shell_enabled},
    {key: 'desktop', label: 'Desktop', enabled: cfg.desktop_enabled},
    {key: 'clipboard', label: 'Clipboard', enabled: cfg.clipboard_enabled},
    {key: 'ssh', label: 'SSH', enabled: cfg.ssh_enabled},
    {key: 'podman', label: 'Podman', daemon: cfg.podman || {}},
    {key: 'ollama', label: 'Ollama', daemon: cfg.ollama || {}},
  ];
  for (const item of builtinRows) {
    const isDaemon = !!item.daemon;
    const enabled = isDaemon ? !!item.daemon.enabled : !!item.enabled;
    const available = isDaemon ? !!item.daemon.available : true;
    const row = el('div', {class: 'item-row' + (isDaemon && !available ? ' dim' : '')});
    const sw = switchEl({checked: enabled, disabled: isDaemon && !available});
    sw.input.addEventListener('change', async () => {
      const newVal = sw.input.checked;
      sw.input.disabled = true;
      try {
        await api('POST', '/api/config/builtins', {[item.key]: newVal});
        msg('ok', status.configured ? `${item.label} ${newVal ? 'on' : 'off'} — restarting…` : `${item.label} saved.`);
        if (status.configured) pollUntilUp();
      } catch (e) {
        sw.input.checked = !newVal;
        sw.input.disabled = false;
        msg('err', e.message || 'Save failed');
      }
    });
    row.append(sw.wrap, el('span', {class: 'label'}, item.label));
    if (isDaemon) {
      if (!available) {
        row.append(el('span', {class: 'hint'}, '(not available)'));
      } else if (item.daemon.target) {
        row.append(el('span', {class: 'hint'}, item.daemon.target));
      }
    }
    builtList.append(row);
  }
  built.append(builtList);
  built.append(el('p', {style: 'font-size:0.8rem;opacity:0.7;margin-top:0.8rem'},
    'Changes save automatically. Toggling a built-in restarts the outpost. Podman/Ollama require the matching daemon to be running on this host.'));
  panelInbound.append(built);

  // Custom apps section — one row per app, target as a clickable link
  // (new tab), status as an auto-saving toggle switch.
  const custom = el('fieldset', {});
  custom.append(el('legend', {}, 'Custom apps'));
  const appsList = el('div', {class: 'item-list'});
  for (const a of (cfg.apps || [])) {
    const row = el('div', {class: 'item-row'});
    // Each HTTP-registered app is reachable on this admin-UI listener
    // at `<origin>/<name>/` (proxied to the underlying target). That's
    // the clickable URL — opening it goes through outpost's proxy with
    // the current admin session, so unix sockets and loopback-only
    // daemons become reachable from this browser too.
    //
    // TCP-scheme apps deliberately don't get a clickable link: the
    // /<name>/ route is a WebSocket bridge to a raw TCP service (ssh,
    // postgres, …); a plain browser GET against it would 4xx and
    // confuse the operator. Show the upstream target instead so they
    // see where it points.
    const appIsTCP = a.scheme === 'tcp';
    // For HTTP apps the admin-UI shortcut link can include IndexPath
    // so the operator opens the same landing page the cloud tile
    // would. Stays a same-origin loopback URL (no cloud).
    const idx = a.index_path || '';
    const proxyHref = `${location.origin}/${encodeURIComponent(a.name)}${idx ? idx : '/'}`;
    let upstream;
    if (a.scheme === 'unix' || a.scheme === 'npipe') {
      upstream = `${a.scheme}://${a.socket || ''}`;
    } else {
      upstream = `${a.scheme || 'http'}://${a.host || '127.0.0.1'}:${a.port}${idx}`;
    }
    const targetEl = appIsTCP
      ? el('span', {class: 'grow'},
          el('span', {}, upstream),
          el('span', {class: 'hint', style: 'margin-left:0.5rem'}, '(tcp bridge — no http path)'))
      : el('span', {class: 'grow'},
          el('a', {href: proxyHref, target: '_blank', rel: 'noopener noreferrer'}, proxyHref),
          el('span', {class: 'hint', style: 'margin-left:0.5rem'}, '→ ' + upstream));
    const sw = switchEl({checked: !!a.enabled});
    sw.input.addEventListener('change', async () => {
      const newVal = sw.input.checked;
      sw.input.disabled = true;
      try {
        // Resend the full AppConfig with the new enabled flag — upsert
        // semantics, no restart needed (AppRegistry is hot-swappable).
        await api('POST', '/api/apps', {...a, enabled: newVal});
        msg('ok', `${a.name} ${newVal ? 'on' : 'off'}.`);
        sw.input.disabled = false;
      } catch (e) {
        sw.input.checked = !newVal;
        sw.input.disabled = false;
        msg('err', e.message || 'Save failed');
      }
    });
    // Show a 🔒 pill when the app demands cloud-side login; show an
    // "/admin" pill when an IndexPath is set so the operator can tell
    // the two virtual apps apart at a glance.
    const pills = [];
    if (a.require_login) pills.push(el('span', {class: 'hint'}, '🔒 login'));
    if (a.index_path)    pills.push(el('span', {class: 'hint'}, a.index_path));
    row.append(
      el('span', {class: 'label'}, a.name),
      targetEl,
      ...pills,
      sw.wrap,
      el('button', {class: 'secondary danger', onclick: async () => {
        if (!confirm(`Remove app "${a.name}"?`)) return;
        try { await api('DELETE', '/api/apps/' + encodeURIComponent(a.name)); render(); }
        catch (e) { msg('err', e.message); }
      }}, 'Remove'),
    );
    appsList.append(row);
  }
  if ((cfg.apps || []).length === 0) {
    appsList.append(el('div', {class: 'item-row', style: 'opacity:0.6'}, 'No custom apps yet.'));
  }
  custom.append(appsList);

  // Match the outbound form's visual rhythm: 22rem cap, flex-column,
  // gap, one field per line. Protocol dropdown drives whether the
  // target is host:port (http/https/tcp) or a socket path (unix/npipe).
  const addForm = el('form', {style: 'max-width: 22rem; display: flex; flex-direction: column; gap: 0.55rem;'});

  // Only the user-relevant schemes — http/https for web apps, tcp for
  // ssh/postgres/etc. unix and npipe are still accepted by the server
  // API (so the built-in podman/ollama toggles keep working), but the
  // Add-app form deliberately doesn't expose them.
  const appSchemeSel = el('select', {name: 'scheme', style: 'width: auto;'},
    el('option', {value: 'http'}, 'http'),
    el('option', {value: 'https'}, 'https'),
    el('option', {value: 'tcp'}, 'tcp'));

  // app-prefixed names avoid colliding with the same-named consts the
  // outbound form below declares in the same renderMain() scope.
  // No "upstream path" field by design: outpost relies on X-Forwarded-*
  // headers to let well-behaved web apps (Grafana, JupyterLab,
  // code-server, …) compute their own absolute URLs. Apps that need a
  // subpath should be told their public URL via their own config knob
  // (GF_SERVER_ROOT_URL etc.), not via a proxy-side rewrite.
  const appHostInput = el('input', {name: 'host', type: 'text', placeholder: '127.0.0.1'});
  const appPortInput = el('input', {name: 'port', type: 'number', min: '1', max: '65535', required: true, placeholder: 'e.g. 8080'});

  const appHostLabel = el('label', {}, 'Host', appHostInput);
  const appPortLabel = el('label', {}, 'Port', appPortInput);

  // Index path lets the operator open two AppConfig rows on the same
  // upstream as separate tiles ("Class" + "Class Admin"). Default
  // blank = land on "/". Cloudbox SPA prepends this to the tile URL;
  // the proxy itself ignores it.
  const appIndexInput = el('input', {name: 'index_path', type: 'text',
    placeholder: '/ or /admin'});
  const appIndexLabel = el('label', {}, 'Index path (optional)', appIndexInput);

  // LAN-only paths: one prefix per line. Outpost 404s on these when
  // the request came via cloudbox (X-Forwarded-Prefix set). Direct
  // LAN/loopback access keeps working — that's where kiosk-style
  // public-but-local endpoints belong.
  const appLanOnlyInput = el('textarea', {name: 'lan_only_paths', rows: '2',
    placeholder: '/kiosk\n/internal'});
  const appLanOnlyLabel = el('label', {}, 'LAN-only paths (one per line)', appLanOnlyInput);

  // Require login: cloudbox refuses to proxy this app without a valid
  // per-(host, app) matrix_elev cookie. Default on; flip off for
  // genuinely public surfaces (welcome page, status pings).
  const appRequireLoginInput = el('input', {name: 'require_login', type: 'checkbox', checked: true});

  addForm.append(el('h2', {style: 'margin-bottom: 0.2rem;'}, 'Add app'),
    el('label', {}, 'Name', el('input', {name: 'name', type: 'text', required: true,
      placeholder: 'e.g. grafana'})),
    el('label', {}, 'Icon URL', el('input', {name: 'icon', type: 'url',
      placeholder: 'optional'})),
    el('label', {}, 'Protocol', appSchemeSel),
    appHostLabel,
    appPortLabel,
    appIndexLabel,
    appLanOnlyLabel,
    el('label', {class: 'check'}, appRequireLoginInput, 'Require login'),
    el('label', {class: 'check'},
      el('input', {name: 'enabled', type: 'checkbox', checked: true}), 'Enabled'),
    el('button', {type: 'submit', style: 'align-self: start; margin-top: 0.3rem;'}, 'Add app'));

  addForm.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(addForm);
    const scheme = (fd.get('scheme') || 'http').toString();
    const lanOnly = (fd.get('lan_only_paths') || '').toString()
      .split('\n').map(s => s.trim()).filter(s => s.length > 0);
    const body = {
      name: (fd.get('name') || '').toString().trim(),
      icon: (fd.get('icon') || '').toString().trim(),
      scheme,
      require_login: appRequireLoginInput.checked,
      index_path: (fd.get('index_path') || '').toString().trim(),
      lan_only_paths: lanOnly,
      enabled: addForm.enabled.checked,
    };
    body.host = (fd.get('host') || '').toString().trim(); // server defaults to 127.0.0.1
    const p = parseInt(fd.get('port'), 10);
    if (!Number.isFinite(p) || p < 1 || p > 65535) {
      msg('err', 'Port must be between 1 and 65535');
      return;
    }
    body.port = p;
    try {
      await api('POST', '/api/apps', body);
      msg('ok', 'App added.');
      render();
    } catch (e) {
      msg('err', e.message || 'Add failed');
    }
  });
  custom.append(addForm);
  panelInbound.append(custom);

  // Outbound — local mount paths that proxy through cloudbox to remote
  // outposts' apps. Connect captures a remote elevation cookie; while
  // connected, http://<this host>:17777/<path>/ tunnels to the remote.
  const outbound = el('fieldset', {});
  outbound.append(el('legend', {}, 'Outbound'));
  const obList = el('div', {class: 'item-list'});
  for (const ob of (cfg.outbound || [])) {
    const row = el('div', {class: 'item-row stacked'});
    const isTCP = ob.scheme === 'tcp';
    const isSSH = ob.scheme === 'ssh';
    const isListenerMount = isTCP || isSSH;
    // HTTP outbounds: reachable as a subpath off the admin UI origin.
    // TCP / SSH outbounds: reachable as a raw TCP socket on
    // 127.0.0.1:<port> (browser can't dial it, so plain text — no <a>).
    const localDisplay = isListenerMount
      ? `tcp://127.0.0.1:${ob.local_port}`
      : `${location.origin}/${encodeURIComponent(ob.path)}/`;
    const lineLabel = isListenerMount ? String(ob.local_port) : ob.path;
    const linkOrText = (!isListenerMount && ob.connected)
      ? el('a', {class: 'grow', href: localDisplay, target: '_blank', rel: 'noopener noreferrer'}, localDisplay)
      : el('span', {class: 'grow'}, localDisplay);
    // Line 1: identifier (path or port) + local endpoint.
    const line1 = el('div', {class: 'line'},
      el('span', {class: 'label'}, lineLabel),
      linkOrText,
    );
    // Line 2: app@host (user) — status — Connect/Disconnect — Remove.
    //   SSH outbounds target the remote outpost's built-in /ssh (no app
    //   name); show "built-in ssh" instead of an "app@" mention.
    const targetLabel = isSSH
      ? `→ built-in ssh @ ${ob.host} (${ob.user})`
      : `→ ${ob.name}@${ob.host} (${ob.user})`;
    const line2 = el('div', {class: 'line'},
      el('span', {class: 'hint grow'}, targetLabel),
      el('span', {class: 'hint'}, ob.connected ? 'connected' : 'disconnected'),
      ob.connected
        ? el('button', {class: 'secondary', onclick: async () => {
            try {
              await api('POST', `/api/outbound/${encodeURIComponent(ob.path)}/disconnect`);
              msg('ok', `${ob.path} disconnected.`);
              render();
            } catch (e) { msg('err', e.message); }
          }}, 'Disconnect')
        : el('button', {onclick: async () => {
            const dlgTitle = isSSH
              ? `Connect to built-in ssh @ ${ob.host}`
              : `Connect to ${ob.name}@${ob.host}`;
            const ok = await passwordDialog({
              title: dlgTitle,
              description: `Enter the OS password for ${ob.user}@${ob.host}.`,
              submitText: 'Connect',
              onSubmit: async (pw) => {
                await api('POST', `/api/outbound/${encodeURIComponent(ob.path)}/connect`,
                  {password: pw});
              },
            });
            if (ok) {
              msg('ok', `${ob.path} connected.`);
              render();
            }
          }}, 'Connect'),
      el('button', {class: 'secondary danger', onclick: async () => {
        if (!confirm(`Remove outbound "${ob.path}"?`)) return;
        try {
          await api('DELETE', `/api/outbound/${encodeURIComponent(ob.path)}`);
          render();
        } catch (e) { msg('err', e.message); }
      }}, 'Remove'),
    );
    row.append(line1, line2);
    obList.append(row);
  }
  if ((cfg.outbound || []).length === 0) {
    obList.append(el('div', {class: 'item-row', style: 'opacity:0.6'},
      'No outbound mounts yet.'));
  }
  outbound.append(obList);

  // Cap the form's width so the inputs don't span the whole 720px page —
  // these fields hold short identifiers (hostnames, usernames, ports),
  // not URLs or paragraphs. flex-column + gap gives a steadier vertical
  // rhythm than relying on label margins.
  const addOb = el('form', {style: 'max-width: 22rem; display: flex; flex-direction: column; gap: 0.55rem;'});
  // Protocol drives which "first" field is shown:
  //   http → Path (local mount under the admin UI listener, e.g. /ollama)
  //   tcp  → Port (loopback TCP port the outpost binds, e.g. 5432)
  // We keep both <input>s in the DOM but hide the inactive one so the
  // FormData payload only carries the relevant value, and switch their
  // The "Remote" dropdown is populated asynchronously from
  // /api/outbound/suggestions (which aggregates cloudbox's
  // /api/v1/hosts). Each <option> carries its host/name/scheme/user
  // in data-* attrs so the submit handler can read them back without
  // hidden fields. Until the fetch resolves the dropdown shows a
  // single "Loading remotes…" placeholder; if the fetch fails (no
  // access token / cloudbox unreachable) we render an inline error.
  const remoteSel = el('select', {name: 'remote', required: true},
    el('option', {value: ''}, 'Loading remotes…'));
  // Local-mount inputs: path for http remotes, port for tcp. Toggled
  // by the picked remote's scheme (see applyRemote below).
  const pathInput = el('input', {name: 'path', type: 'text',
    placeholder: 'e.g. /ollama'});
  const portInput = el('input', {name: 'local_port', type: 'number',
    min: '1', max: '65535', placeholder: 'e.g. 5432'});
  const pathLabel = el('label', {style: 'display:none'}, 'Path (local mount)', pathInput);
  const portLabel = el('label', {style: 'display:none'}, 'Port (localhost)', portInput);
  // Status hint that shows the auto-filled host/user for the currently
  // picked remote, so the operator can confirm what they're connecting
  // to without us re-displaying it as raw input fields.
  const remoteHint = el('div', {class: 'hint', style: 'margin-top:-0.3rem; min-height:1em;'}, '');
  const applyRemote = () => {
    const opt = remoteSel.selectedOptions[0];
    const scheme = (opt && opt.dataset.scheme) || '';
    const isListener = scheme === 'tcp' || scheme === 'ssh';
    pathLabel.style.display = scheme === 'http' ? '' : 'none';
    portLabel.style.display = isListener ? '' : 'none';
    pathInput.required = scheme === 'http';
    portInput.required = isListener;
    remoteHint.textContent = (opt && opt.dataset.host)
      ? `${opt.dataset.host} · ${opt.dataset.user || '(no os user)'} · ${scheme}`
      : '';
  };
  remoteSel.addEventListener('change', applyRemote);

  addOb.append(el('h2', {style: 'margin-bottom: 0.2rem;'}, 'Add outbound'),
    el('label', {}, 'Remote', remoteSel),
    remoteHint,
    pathLabel,
    portLabel,
    el('button', {type: 'submit', style: 'align-self: start; margin-top: 0.3rem;'}, 'Add outbound'));

  // Kick off the fetch after the form is in the DOM so the user sees
  // the placeholder option immediately. The result populates the
  // dropdown in place.
  (async () => {
    try {
      const r = await api('GET', '/api/outbound/suggestions');
      const list = (r && r.suggestions) || [];
      remoteSel.innerHTML = '';
      if (list.length === 0) {
        remoteSel.append(el('option', {value: ''}, '(no remote apps available)'));
        applyRemote();
        return;
      }
      // Empty placeholder first so the user has to make a deliberate
      // choice rather than silently inheriting the first row.
      remoteSel.append(el('option', {value: ''}, '— pick a remote —'));
      for (const s of list) {
        // SSH-builtin suggestions ship with name="" — render them as
        // "host / built-in ssh (ssh)" so the dropdown reads sensibly.
        const isSSHBuiltin = s.scheme === 'ssh';
        const displayName = isSSHBuiltin ? 'built-in ssh' : s.name;
        const label = `${s.host} / ${displayName} (${s.scheme || 'http'})`
          + (s.require_login ? ' 🔒' : '')
          + (s.online ? '' : ' — offline')
          + (s.shared ? ' — shared' : '');
        const opt = el('option',
          {value: `${s.host}/${isSSHBuiltin ? '__ssh__' : s.name}`}, label);
        opt.dataset.host = s.host;
        opt.dataset.name = s.name; // empty for ssh-builtin; submit handler keys off scheme
        opt.dataset.user = s.os_user || '';
        opt.dataset.scheme = s.scheme || 'http';
        opt.dataset.indexPath = s.index_path || '';
        remoteSel.append(opt);
      }
      applyRemote();
    } catch (e) {
      remoteSel.innerHTML = '';
      remoteSel.append(el('option', {value: ''}, '— failed to load remotes —'));
      msg('err', 'Could not load remote apps: ' + (e.message || e));
    }
  })();

  addOb.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const opt = remoteSel.selectedOptions[0];
    if (!opt || !opt.dataset.host) {
      msg('err', 'Pick a remote to mount.');
      return;
    }
    const scheme = opt.dataset.scheme || 'http';
    const host = opt.dataset.host;
    const name = opt.dataset.name;
    const user = opt.dataset.user;
    const body = { host, name, user, scheme };
    if (scheme === 'tcp' || scheme === 'ssh') {
      const port = parseInt(portInput.value, 10);
      if (!Number.isFinite(port) || port < 1 || port > 65535) {
        msg('err', 'Port must be between 1 and 65535');
        return;
      }
      body.local_port = port;
      // Synthesize a path identifier: <host>-<name>-<port> for tcp, or
      // <host>-ssh-<port> for the built-in ssh mount (no app name).
      body.path = scheme === 'ssh'
        ? `${host}-ssh-${port}`
        : `${name}-${port}`;
    } else {
      // Accept "/ollama" or "ollama"; server requires a slash-free path,
      // so strip a leading slash here.
      body.path = pathInput.value.replace(/^\/+/, '').trim();
      if (!body.path) {
        msg('err', 'Path is required.');
        return;
      }
    }
    try {
      await api('POST', '/api/outbound', body);
      msg('ok', 'Outbound added.');
      render();
    } catch (e) {
      msg('err', e.message || 'Add failed');
    }
  });
  outbound.append(addOb);
  panelOutbound.append(outbound);

  // Header actions (Restart / Sign out) — primary blue, right-aligned in
  // the page header.
  const ha = $('#header-actions');
  ha.innerHTML = '';
  ha.append(
    el('button', {onclick: async () => {
      try { await api('POST', '/api/restart'); msg('ok', 'Restarting…'); pollUntilUp(); }
      catch (e) { msg('err', e.message); }
    }}, 'Restart outpost'),
    el('button', {onclick: async () => {
      try { await api('POST', '/api/logout'); render(); }
      catch (e) { msg('err', e.message); }
    }}, 'Sign out'),
  );
}

async function pollUntilUp() {
  for (let i = 0; i < 40; i++) {
    await new Promise(r => setTimeout(r, 500));
    try {
      await fetch('/healthz', { cache: 'no-store' });
      // Healthz comes up immediately on the new process; give the API
      // routes a beat to bind too, then reload.
      setTimeout(() => render(), 250);
      return;
    } catch (_) {}
  }
  msg('err', 'Outpost did not come back. Check the logs.');
}

// One-shot decoration: drop the coin into the page header next to the
// title. Runs on script load so it persists across render() rebuilds
// (the header lives outside #app).
(() => {
  const h1 = document.querySelector('header.app-header h1');
  if (h1 && !h1.querySelector('svg')) {
    h1.prepend(coinLogo(28));
  }
})();

render();
</script>
</body>
</html>
