                  : isYcode  ? !!item.ycode.enabled
                  : !!item.enabled;
    // available is informational (drives the dim styling + status hint),
    // NOT a gate on the toggle. Pre-enabling a daemon proxy whose socket
    // isn't reachable yet is a legitimate workflow: outpost's boot path
    // (buildAppRegistry) silently skips unavailable daemons, so flipping
    // the toggle on persists the intent and the next restart picks the
    // daemon up once the operator starts it. The only genuinely
    // un-toggleable cases are: (a) ycode on an OS/arch ycode doesn't
    // build for, and (b) a child toggle whose parent is off
    // (Ollama-pool when Ollama is off). Everything else stays operable.
    const available = isDaemon ? !!item.daemon.available
                    : isYcode  ? !!item.ycode.platform_supported
                    : true;
    const disabled = (isYcode && !available) || (isGated && !gateOK);
    const row = el('div', {class: 'item-row' + (disabled || (isDaemon && !available) ? ' dim' : '')});
    const sw = switchEl({checked: enabled && gateOK, disabled: disabled});
    sw.input.addEventListener('change', async () => {
      const newVal = sw.input.checked;
      sw.input.disabled = true;
      try {
        const res = await api('POST', '/api/config/builtins', {[item.key]: newVal});
        msg('ok', `${item.label} ${newVal ? 'on' : 'off'}.`);
        noteRestartPending(res);
      } catch (e) {
        sw.input.checked = !newVal;
        sw.input.disabled = false;
        msg('err', e.message || 'Save failed');
      }
    });
    // Label + canonical key subtext. The key subtext is what an
    // operator searches for in agent.json or types as a --<key> CLI
    // flag (after dropping `_enabled`), so surfacing it visibly here
    // keeps the SPA/CLI/MCP vocabulary aligned without forcing the
    // human-facing label to be ugly.
    row.append(
      sw.wrap,
      el('span', {class: 'label'},
        item.label,
        ' ',
        el('code', {class: 'key-hint'}, item.fileKey),
      ),
    );
    if (isDaemon) {
      if (!available) {
        // Probe didn't find a daemon at boot. The toggle is still
        // operable so the operator can pre-enable; the hint spells
        // out that nothing's proxied until the daemon comes up.
        const tried = item.daemon.target ? ` (tried ${item.daemon.target})` : '';
        row.append(el('span', {class: 'hint'}, 'not detected' + tried));
      } else if (item.daemon.target) {
        row.append(el('span', {class: 'hint'}, item.daemon.target));
        const src = daemonSourceLabel(item.daemon.target);
        if (src) row.append(el('span', {class: 'hint'}, src));
      }
    }
    if (isYcode) {
      // Right-side hint mirrors detect.go's State output. Order
      // matters: platform check first so unsupported platforms
      // don't show misleading install advice.
      if (!item.ycode.platform_supported) {
        row.append(el('span', {class: 'hint'}, 'ycode not available for this OS/arch'));
      } else if (item.ycode.running) {
        row.append(el('span', {class: 'hint'}, item.ycode.api_endpoint || 'running'));
      } else if (item.ycode.installed) {
        row.append(el('span', {class: 'hint'}, 'installed; will start on next restart'));
      } else if (item.ycode.stale_manifest) {
        row.append(el('span', {class: 'hint'}, 'stale manifest — will clean up on start'));
      } else {
        row.append(el('span', {class: 'hint'}, 'not installed'));
      }
    }
    if (isGated && !gateOK) {
      // gateHint is row-specific; falls back to the Ollama-pool hint for
      // back-compat with rows that don't set one.
      row.append(el('span', {class: 'hint'}, item.gateHint || '(enable Ollama first)'));
    }
    // If this row has nested settings, append a chevron + a collapsed
    // sub-block container. The sub-block is built lazily on first
    // expand so we never pay for DOM that the operator hasn't asked
    // to see; once built, expand/collapse is just toggling .hidden.
    let subContainer = null;
    if (item.subBlock) {
      const chev = el('button', {
        type: 'button', class: 'chevron',
        'aria-expanded': 'false',
        title: 'Show nested settings',
      }, '▶');
      subContainer = el('div', {class: 'item-subblock hidden'});
      let built = false;
      chev.addEventListener('click', () => {
        if (!built) { item.subBlock(subContainer, cfg, status); built = true; }
        const open = subContainer.classList.contains('hidden');
        subContainer.classList.toggle('hidden', !open);
        chev.setAttribute('aria-expanded', open ? 'true' : 'false');
        chev.title = open ? 'Hide nested settings' : 'Show nested settings';
      });
      row.append(chev);
    }
    parent.append(row);
    if (subContainer) parent.append(subContainer);
  }
}

function renderMain(status, cfg) {
  const app = $('#app');
  app.innerHTML = '';
  // Banner is re-mounted on every render; renderRestartBanner is a
  // no-op when restartNeeded is false.
  renderRestartBanner();

  // Tab bar + four panels: Pair host, Inbound, Outbound, Update.
  // Update consolidates everything cloudbox-pushed-upgrade-related —
  // current build info, the auto/manual/never policy selector, and
  // (future) ledger / rollback affordances — so the operator has one
  // place to look when they're thinking about versions.
  const tabs = el('div', {class: 'tabs'});
  const panels = el('div', {class: 'tab-panels'});
  const panelPair = el('div', {class: 'tab-panel', 'data-panel': 'pair'});
  const panelInbound = el('div', {class: 'tab-panel', 'data-panel': 'inbound'});
  const panelOutbound = el('div', {class: 'tab-panel', 'data-panel': 'outbound'});
  const panelUpdate = el('div', {class: 'tab-panel', 'data-panel': 'update'});
  panels.append(panelPair, panelInbound, panelOutbound, panelUpdate);

  // Initial tab: stored preference if any, else 'inbound' once paired
  // (the common case), else 'pair' (operator still needs to finish
  // setup).
  let active = localStorage.getItem(TAB_KEY);
  if (!['pair', 'inbound', 'outbound', 'update'].includes(active)) {
    active = status.configured ? 'inbound' : 'pair';
  }
  const tabDefs = [
    ['pair', 'Pair host'],
    ['inbound', 'Inbound'],
    ['outbound', 'Outbound'],
    ['update', 'Update'],
  ];
  const tabBtns = {};
  for (const [key, label] of tabDefs) {
    const b = el('button', {type: 'button', class: 'tab' + (key === active ? ' active' : ''),
                            onclick: () => activate(key)}, label);
    tabBtns[key] = b;
    tabs.append(b);
  }
  function activate(key) {
    for (const [k] of tabDefs) {
      tabBtns[k].classList.toggle('active', k === key);
    }
    panelPair.classList.toggle('hidden', key !== 'pair');
    panelInbound.classList.toggle('hidden', key !== 'inbound');
    panelOutbound.classList.toggle('hidden', key !== 'outbound');
    panelUpdate.classList.toggle('hidden', key !== 'update');
    try { localStorage.setItem(TAB_KEY, key); } catch (_) {}
  }
  activate(active);

  app.append(tabs, panels);

  panelPair.append(buildPairSection(status, cfg));
  panelPair.append(buildMCPCredentialsSection());
  panelPair.append(buildAdvancedSettingsSection(cfg));

  // Built-in apps section — two fieldsets, one per logical cluster:
  //   1. "Built-in apps" — shell / desktop / clipboard / ssh
  //      (the always-there outpost-native services)
  //   2. "Agentic platform" — ycode / podman / ollama / OTel
  //      (the bring-your-own-engine cluster — each can run as a
  //      standalone daemon OR be supplied by ycode; outpost detects
  //      whichever is live)
  // Both fieldsets render via renderBuiltinRows() so the row markup,
  // auto-save POST, restart-pending banner, sub-block chevron, and
  // dim/available logic stay byte-for-byte identical to today's
  // single-fieldset layout.

  // Each row carries:
  //   key     — JSON field on POST /api/config/builtins (REST/MCP arg)
  //   fileKey — agent.json key (canonical name; usually `<key>_enabled`)
  //   label   — human-readable display
  //   subBlock(parent, cfg) — optional; builds nested DOM (sub-toggles,
  //     textareas, status banners) revealed by a chevron twister next
  //     to the row. Used to nest SSH-channel knobs under SSH and the
  //     cluster/kubeconfig surface under Podman.
  // The fileKey is rendered as a small subtext so an operator switching
  // between the SPA, the CLI (--<fileKey> minus _enabled), and the MCP
  // tool args / agent.json can match concepts up at a glance.
  const coreRows = [
    {key: 'shell',     fileKey: 'shell_enabled',     label: 'Shell',     enabled: cfg.shell_enabled},
    {key: 'desktop',   fileKey: 'desktop_enabled',   label: 'Desktop',   enabled: cfg.desktop_enabled},
    {key: 'clipboard', fileKey: 'clipboard_enabled', label: 'Clipboard', enabled: cfg.clipboard_enabled},
    {key: 'ssh',       fileKey: 'ssh_enabled',       label: 'SSH',       enabled: cfg.ssh_enabled,
     subBlock: buildSSHSubBlock},
  ];
  const agenticRows = [
    // ycode is supervised differently from podman/ollama: the row is
    // toggleable even when ycode isn't running (the toggle turns on
    // outpost-side supervision; the next outpost restart spawns the
    // process if installed). The sub-block surfaces install state +
    // a download link when no binary is found. Listed first so the
    // operator reads top-to-bottom as "engine, then what it provides".
    {key: 'ycode',     fileKey: 'ycode_enabled',     label: 'ycode',     ycode: cfg.ycode || {},
     subBlock: buildYcodeSubBlock},
    {key: 'podman',    fileKey: 'podman_enabled',    label: 'Podman',    daemon: cfg.podman || {},
     subBlock: buildPodmanSubBlock},
    {key: 'ollama',    fileKey: 'ollama_enabled',    label: 'Ollama',    daemon: cfg.ollama || {},
     subBlock: buildOllamaSubBlock},
    // OTel row hidden from the SPA again — the per-host views work
    // (otel-prometheus, otel-logs, otel-alerts, otel-traces,
    // otel-dashboard tiles publish when otel_enabled is on) but the
    // SPA-level toggle invites UX confusion until the OTel story has
    // a proper home. CLI/MCP can still flip the toggle for operators
    // who specifically need the per-host views.
    // Re-expose by inserting the same `{key: 'otel', ...}` entry here.
  ];

  const built = el('fieldset', {});
  built.append(el('legend', {}, 'Built-in apps'));
  const builtList = el('div', {class: 'item-list'});
  renderBuiltinRows(builtList, coreRows, cfg, status);
  built.append(builtList);
  built.append(el('p', {style: 'font-size:0.8rem;opacity:0.7;margin-top:0.8rem'},
    'Changes save automatically. Toggling a built-in restarts the outpost.'));
  panelInbound.append(built);

  const agentic = el('fieldset', {});
  agentic.append(el('legend', {}, 'Agentic platform'));
  const agenticList = el('div', {class: 'item-list'});
  renderBuiltinRows(agenticList, agenticRows, cfg, status);
  agentic.append(agenticList);
  agentic.append(el('p', {style: 'font-size:0.8rem;opacity:0.7;margin-top:0.8rem'},
    'Podman and Ollama can run as your own standalone daemons OR be managed by ycode — outpost detects whichever is live and shows the source next to each row.'));
  panelInbound.append(agentic);

  // (update_mode selector lives on the dedicated Update tab; this
  // panel stays focused on routes + daemon-proxy toggles.)
  // (LLM pool diagnostic was folded into the Ollama twister above —
  // all Ollama-related state in one place.)

  // (The Cluster Status section was folded into the Podman twister
  // above so all cluster-related controls live behind one twister
  // alongside the dependency they require.)

  // Custom apps section — one row per app, target as a clickable link
  // (new tab), status as an auto-saving toggle switch. The legend
  // hosts the title and a "+ Add app" button on the same row;
  // clicking the button toggles a drawer with the manual form +
  // suggestions inline below the legend.
  const custom = el('fieldset', {});
  const customAddBtn = el('button', {type: 'button', class: 'legend-action'}, '+ Add app');
  custom.append(el('legend', {class: 'with-action'},
    el('span', {}, 'Custom apps'),
    customAddBtn));
  const appsList = el('div', {class: 'item-list'});
  // Cloud URL of this paired outpost. Used to render the "incoming URL"
  // an app exposes to users via cloudbox — e.g. https://ai.dhnt.io/h/<host>/app/<name>/.
  // Empty when the outpost isn't paired yet (in which case the apps tab
  // shows the local proxy URL instead, since there is no public surface).
  const cloudboxURL = (cfg.cloudbox_url || '').replace(/\/+$/, '');
  const agentName = cfg.agent_name || status.agent_name || '';
  for (const a of (cfg.apps || [])) {
    const row = el('div', {class: 'item-row'});
    // TCP-scheme apps deliberately don't get a clickable link: the
    // /<name>/ route is a WebSocket bridge to a raw TCP service (ssh,
    // postgres, …); a plain browser GET against it would 4xx and
    // confuse the operator. Show the upstream target instead so they
    // see where it points.
    const appIsTCP = a.scheme === 'tcp';
    // For HTTP apps we publish the cloud URL — that's where end users
    // actually reach the app (cloudbox proxies it through the matrix
    // tunnel into this outpost). Includes the configured IndexPath so
    // operators see the exact landing path the SPA tile uses. When the
    // outpost isn't paired yet, fall back to the local admin-UI proxy
    // shortcut so the row still has something clickable for self-test.
    const idx = a.index_path || '';
    const cloudHref = cloudboxURL && agentName
      ? `${cloudboxURL}/h/${encodeURIComponent(agentName)}/app/${encodeURIComponent(a.name)}${idx || '/'}`
      : '';
    const localHref = `${location.origin}/${encodeURIComponent(a.name)}${idx || '/'}`;
    const incomingHref = cloudHref || localHref;
    let upstream;
    if (a.scheme === 'unix' || a.scheme === 'npipe') {
      upstream = `${a.scheme}://${a.socket || ''}`;
    } else {
      upstream = `${a.scheme || 'http'}://${a.host || '127.0.0.1'}:${a.port}${idx}`;
    }
    const targetEl = appIsTCP
      ? el('span', {class: 'grow'},
          el('span', {}, upstream),
          el('span', {class: 'hint', style: 'margin-left:0.5rem'}, '(tcp bridge — no http path)'))
      : el('span', {class: 'grow'},
          el('a', {href: incomingHref, target: '_blank', rel: 'noopener noreferrer'}, incomingHref),
          el('span', {class: 'hint', style: 'margin-left:0.5rem'}, '→ ' + upstream));
    const sw = switchEl({checked: !!a.enabled});
    sw.input.addEventListener('change', async () => {
      const newVal = sw.input.checked;
      sw.input.disabled = true;
      try {
        // Resend the full AppConfig with the new enabled flag — upsert
        // semantics, no restart needed (AppRegistry is hot-swappable).
        await api('POST', '/api/apps', {...a, enabled: newVal});
        msg('ok', `${a.name} ${newVal ? 'on' : 'off'}.`);
        sw.input.disabled = false;
      } catch (e) {
        sw.input.checked = !newVal;
        sw.input.disabled = false;
        msg('err', e.message || 'Save failed');
      }
    });
    // Show a 🔒 pill when the app demands cloud-side login; show an
    // "/admin" pill when an IndexPath is set so the operator can tell
    // the two virtual apps apart at a glance; show a "LAN-only: /a, /b"
    // pill when the app has LAN-only path prefixes set (the gate that
    // 404s those paths through cloudbox while leaving them reachable on
    // the LAN — easy to forget once configured, so surface it).
    const pills = [];
    if (a.require_login) pills.push(el('span', {class: 'hint'}, '🔒 login'));
    if (a.trust_cloud_identity) pills.push(el('span', {class: 'hint'}, '🪪 SSO'));
    if (a.index_path)    pills.push(el('span', {class: 'hint'}, a.index_path));
    if (Array.isArray(a.lan_only_paths) && a.lan_only_paths.length > 0) {
      pills.push(el('span', {class: 'hint'}, 'LAN-only: ' + a.lan_only_paths.join(', ')));
    }
    row.append(
      el('span', {class: 'label'}, a.name),
      targetEl,
      ...pills,
      sw.wrap,
      el('button', {class: 'secondary danger', onclick: async () => {
        const ok = await confirmDialog({
          title: `Remove app "${a.name}"?`,
          description: 'This unregisters the proxy on this outpost. The upstream app itself is not touched.',
          confirmText: 'Remove',
        });
        if (!ok) return;
        try { await api('DELETE', '/api/apps/' + encodeURIComponent(a.name)); render(); }
        catch (e) { msg('err', e.message); }
      }}, 'Remove'),
    );
    // SSO-enabled apps get a chevron + collapsed bearer panel —
    // same twister pattern as the SSH/Podman nests. Keeps the apps
    // list one-line-per-app at rest; the bearer surface is one
    // click away when the operator needs to copy/rotate it.
    let provSubBlock = null;
    if (a.trust_cloud_identity && a.provisioning_token) {
      const chev = el('button', {
        type: 'button', class: 'chevron',
        'aria-expanded': 'false',
        title: 'Show provisioning bearer',
      }, '▶');
      provSubBlock = el('div', {class: 'item-subblock hidden'});
      let built = false;
      chev.addEventListener('click', () => {
        if (!built) { populateProvSubBlock(provSubBlock, a); built = true; }
        const open = provSubBlock.classList.contains('hidden');
        provSubBlock.classList.toggle('hidden', !open);
        chev.setAttribute('aria-expanded', open ? 'true' : 'false');
        chev.title = open ? 'Hide provisioning bearer' : 'Show provisioning bearer';
      });
      row.append(chev);
    }
    appsList.append(row);
    if (provSubBlock) appsList.append(provSubBlock);
  }
  if ((cfg.apps || []).length === 0) {
    appsList.append(el('div', {class: 'item-row', style: 'opacity:0.6'}, 'No custom apps yet — click + Add app above.'));
  }
  // (appsList is appended to `custom` below, AFTER the add-row, so
  // the "+ Add app" twister is the first row under the legend.)

  // Match the outbound form's visual rhythm: 22rem cap, flex-column,
  // gap, one field per line. Protocol dropdown drives whether the
  // target is host:port (http/https/tcp) or a socket path (unix/npipe).
  const addForm = el('form', {style: 'max-width: 22rem; display: flex; flex-direction: column; gap: 0.55rem;'});

  // Only the user-relevant schemes — http/https for web apps, tcp for
  // ssh/postgres/etc. unix and npipe are still accepted by the server
  // API (so the built-in podman/ollama toggles keep working), but the
  // Add-app form deliberately doesn't expose them.
  const appSchemeSel = el('select', {name: 'scheme', style: 'width: auto;'},
    el('option', {value: 'http'}, 'http'),
    el('option', {value: 'https'}, 'https'),
    el('option', {value: 'tcp'}, 'tcp'));

  // app-prefixed names avoid colliding with the same-named consts the
  // outbound form below declares in the same renderMain() scope.
  // No "upstream path" field by design: outpost relies on X-Forwarded-*
  // headers to let well-behaved web apps (Grafana, JupyterLab,
  // code-server, …) compute their own absolute URLs. Apps that need a
  // subpath should be told their public URL via their own config knob
  // (GF_SERVER_ROOT_URL etc.), not via a proxy-side rewrite.
  const appHostInput = el('input', {name: 'host', type: 'text', placeholder: '127.0.0.1'});
  const appPortInput = el('input', {name: 'port', type: 'number', min: '1', max: '65535', required: true, placeholder: 'e.g. 8080'});

  const appHostLabel = el('label', {}, 'Host', appHostInput);
  const appPortLabel = el('label', {}, 'Port', appPortInput);

  // Index path lets the operator open two AppConfig rows on the same
  // upstream as separate tiles ("Class" + "Class Admin"). Default
  // blank = land on "/". Cloudbox SPA prepends this to the tile URL;
  // the proxy itself ignores it.
  const appIndexInput = el('input', {name: 'index_path', type: 'text',
    placeholder: '/ or /admin'});
  const appIndexLabel = el('label', {}, 'Index path (optional)', appIndexInput);

  // LAN-only paths: one prefix per line. Outpost 404s on these when
  // the request came via cloudbox (X-Forwarded-Prefix set). Direct
  // LAN/loopback access keeps working — that's where kiosk-style
  // public-but-local endpoints belong.
  const appLanOnlyInput = el('textarea', {name: 'lan_only_paths', rows: '2',
    placeholder: '/kiosk\n/internal'});
  const appLanOnlyLabel = el('label', {}, 'LAN-only paths (one per line)', appLanOnlyInput);

  // Require login: cloudbox refuses to proxy this app without a valid
  // per-(host, app) matrix_elev cookie. Default on; flip off for
  // genuinely public surfaces (welcome page, status pings).
  const appRequireLoginInput = el('input', {name: 'require_login', type: 'checkbox', checked: true});

  // Trust cloudbox identity: when on, outpost stamps Remote-User /
  // Remote-Email / Remote-Groups (and passes through X-Periscope-*)
  // on cloud-origin requests so the app can skip its own login. Also
  // enables the /_periscope/apps/<name>/users provisioning relay
  // backed by an auto-generated per-app bearer.
  const appTrustCloudInput = el('input', {name: 'trust_cloud_identity', type: 'checkbox'});

  addForm.append(
    el('label', {}, 'Name', el('input', {name: 'name', type: 'text', required: true,
      placeholder: 'e.g. grafana'})),
    el('label', {}, 'Icon URL', el('input', {name: 'icon', type: 'url',
      placeholder: 'optional'})),
    el('label', {}, 'Protocol', appSchemeSel),
    appHostLabel,
    appPortLabel,
    appIndexLabel,
    appLanOnlyLabel,
    el('label', {class: 'check'}, appRequireLoginInput, 'Require login'),
    el('label', {class: 'check'}, appTrustCloudInput,
      'Trust cloudbox identity (SSO + grant push)'),
    el('label', {class: 'check'},
      el('input', {name: 'enabled', type: 'checkbox', checked: true}), 'Enabled'),
    el('button', {type: 'submit', style: 'align-self: start; margin-top: 0.3rem;'}, 'Save'));

  addForm.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(addForm);
    const scheme = (fd.get('scheme') || 'http').toString();
    const lanOnly = (fd.get('lan_only_paths') || '').toString()
      .split('\n').map(s => s.trim()).filter(s => s.length > 0);
    const body = {
      name: (fd.get('name') || '').toString().trim(),
      icon: (fd.get('icon') || '').toString().trim(),
      scheme,
      require_login: appRequireLoginInput.checked,
      trust_cloud_identity: appTrustCloudInput.checked,
      index_path: (fd.get('index_path') || '').toString().trim(),
      lan_only_paths: lanOnly,
      enabled: addForm.enabled.checked,
    };
    body.host = (fd.get('host') || '').toString().trim(); // server defaults to 127.0.0.1
    const p = parseInt(fd.get('port'), 10);
    if (!Number.isFinite(p) || p < 1 || p > 65535) {
      msg('err', 'Port must be between 1 and 65535');
      return;
    }
    body.port = p;
    try {
      await api('POST', '/api/apps', body);
      msg('ok', 'App added.');
      render();
    } catch (e) {
      msg('err', e.message || 'Add failed');
    }
  });
  // Drawer revealed by the + Add app legend-action. Hidden by
  // default; click toggles. Contains the suggestions sub-panel
  // (fetched lazily on first open) + the manual add form.
  const addDrawer = el('div', {class: 'add-drawer hidden'});

  const suggBox = el('div', {style: 'margin:0 0 0.8rem;padding:0.6rem 0.75rem;border:1px solid #8884;border-radius:6px;background:#10b98111;font-size:0.9rem;'});
  suggBox.append(el('div', {style: 'font-weight:600;margin-bottom:0.35rem'}, 'Detected on this host'));
  const suggList = el('div', {});
  suggBox.append(suggList,
    el('p', {class: 'hint', style: 'margin-top:0.4rem'},
      'Auto-discovered from well-known sockets and ~/.agents/ycode/manifest.json. ' +
      'One click registers the entry as a custom app.'));

  let suggLoaded = false;
  customAddBtn.addEventListener('click', async () => {
    const wasHidden = addDrawer.classList.contains('hidden');
    addDrawer.classList.toggle('hidden');
    customAddBtn.classList.toggle('open', wasHidden);
    customAddBtn.textContent = wasHidden ? '− Close' : '+ Add app';
    if (!wasHidden) return; // we just closed it; nothing else to do
    // Focus the first text input so the operator can type immediately.
    const firstInput = addForm.querySelector('input[name="name"]');
    if (firstInput) setTimeout(() => firstInput.focus(), 0);
    if (suggLoaded) return;
    suggLoaded = true;
    try {
      const res = await api('GET', '/api/apps/suggestions');
      renderSuggestions(suggList, res.suggestions || []);
    } catch (e) {
      suggList.append(el('p', {class: 'hint'}, 'Suggestions unavailable: ' + (e.message || 'fetch failed')));
    }
  });

  addDrawer.append(
    suggBox,
    el('h3', {style: 'margin:0.6rem 0 0.4rem;font-size:0.95rem'}, 'Manual add'),
    addForm,
  );

  // Order under the legend: drawer first (hidden by default), then
  // the existing apps list. When the drawer opens it sits right
  // below the legend, above the list — matching the operator's
  // mental "add this above the existing rows".
  custom.append(addDrawer, appsList);
  panelInbound.append(custom);

  // Outbound — local mount paths that proxy through cloudbox to remote
  // outposts' apps. Connect captures a remote elevation cookie; while
  // connected, http://<this host>:17777/<path>/ tunnels to the remote.
  // Same legend + action-button pattern as Custom apps above.
  const outbound = el('fieldset', {});
  const outboundAddBtn = el('button', {type: 'button', class: 'legend-action'}, '+ Add outbound');
  outbound.append(el('legend', {class: 'with-action'},
    el('span', {}, 'Outbound'),
    outboundAddBtn));
  const obList = el('div', {class: 'item-list'});
  for (const ob of (cfg.outbound || [])) {
    const row = el('div', {class: 'item-row stacked'});
    const isTCP = ob.scheme === 'tcp';
    const isSSH = ob.scheme === 'ssh';
    const isListenerMount = isTCP || isSSH;
    // HTTP outbounds: reachable as a subpath off the admin UI origin.
    // TCP / SSH outbounds: reachable as a raw TCP socket on
    // 127.0.0.1:<port> (browser can't dial it, so plain text — no <a>).
    const localDisplay = isListenerMount
      ? `tcp://127.0.0.1:${ob.local_port}`
      : `${location.origin}/${encodeURIComponent(ob.path)}/`;
    const lineLabel = isListenerMount ? String(ob.local_port) : ob.path;
    const linkOrText = (!isListenerMount && ob.connected)
      ? el('a', {class: 'grow', href: localDisplay, target: '_blank', rel: 'noopener noreferrer'}, localDisplay)
      : el('span', {class: 'grow'}, localDisplay);
    // Line 1: identifier (path or port) + local endpoint.
    const line1 = el('div', {class: 'line'},
      el('span', {class: 'label'}, lineLabel),
      linkOrText,
    );
    // Line 2: app@host (user) — TTL — status — Connect/Disconnect — Remove.
    //   SSH outbounds target the remote outpost's built-in /ssh (no app
    //   name); show "built-in ssh" instead of an "app@" mention.
    const targetLabel = isSSH
      ? `→ built-in ssh @ ${ob.host} (${ob.user})`
      : `→ ${ob.name}@${ob.host} (${ob.user})`;
    const line2 = el('div', {class: 'line'},
      el('span', {class: 'hint grow'}, targetLabel),
      el('span', {class: 'hint'}, `ttl: ${formatTTL(ob.ttl_seconds)}`),
      el('span', {class: 'hint'}, ob.connected ? 'connected' : 'disconnected'),
      ob.connected
        ? el('button', {class: 'secondary', onclick: async () => {
            try {
              await api('POST', `/api/outbound/${encodeURIComponent(ob.path)}/disconnect`);
              msg('ok', `${ob.path} disconnected.`);
              render();
            } catch (e) { msg('err', e.message); }
          }}, 'Disconnect')
        : el('button', {onclick: async () => {
            const dlgTitle = isSSH
              ? `Connect to built-in ssh @ ${ob.host}`
              : `Connect to ${ob.name}@${ob.host}`;
            const ok = await passwordDialog({
              title: dlgTitle,
              description: `Enter the OS password for ${ob.user}@${ob.host}.`,
              submitText: 'Connect',
              onSubmit: async (pw) => {
                await api('POST', `/api/outbound/${encodeURIComponent(ob.path)}/connect`,
                  {password: pw});
              },
            });
            if (ok) {
              msg('ok', `${ob.path} connected.`);
              render();
            }
          }}, 'Connect'),
      el('button', {class: 'secondary danger', onclick: async () => {
        const ok = await confirmDialog({
          title: `Remove outbound "${ob.path}"?`,
          description: ob.connected
            ? 'This drops the active connection and removes the mount from this outpost.'
            : 'This removes the mount from this outpost. No remote state is touched.',
          confirmText: 'Remove',
        });
        if (!ok) return;
        try {
          await api('DELETE', `/api/outbound/${encodeURIComponent(ob.path)}`);
          render();
        } catch (e) { msg('err', e.message); }
      }}, 'Remove'),
    );
    row.append(line1, line2);
    obList.append(row);
  }
  if ((cfg.outbound || []).length === 0) {
    obList.append(el('div', {class: 'item-row', style: 'opacity:0.6'},
      'No outbound mounts yet — click + Add outbound above.'));
  }
  // (obList is appended to `outbound` below, AFTER the add-row, so
  // the "+ Add outbound" twister is the first row under the legend.)

  // Cap the form's width so the inputs don't span the whole 720px page —
  // these fields hold short identifiers (hostnames, usernames, ports),
  // not URLs or paragraphs. flex-column + gap gives a steadier vertical
  // rhythm than relying on label margins.
  const addOb = el('form', {style: 'max-width: 22rem; display: flex; flex-direction: column; gap: 0.55rem;'});
  // Protocol drives which "first" field is shown:
  //   http → Path (local mount under the admin UI listener, e.g. /ollama)
  //   tcp  → Port (loopback TCP port the outpost binds, e.g. 5432)
  // We keep both <input>s in the DOM but hide the inactive one so the
  // FormData payload only carries the relevant value, and switch their
  // The "Remote" dropdown is populated asynchronously from
  // /api/outbound/suggestions (which aggregates cloudbox's
  // /api/v1/hosts). Each <option> carries its host/name/scheme/user
  // in data-* attrs so the submit handler can read them back without
  // hidden fields. Until the fetch resolves the dropdown shows a
  // single "Loading remotes…" placeholder; if the fetch fails (no
  // access token / cloudbox unreachable) we render an inline error.
  const remoteSel = el('select', {name: 'remote', required: true},
    el('option', {value: ''}, 'Loading remotes…'));
  // Local-mount inputs: path for http remotes, port for tcp. Toggled
  // by the picked remote's scheme (see applyRemote below).
  const pathInput = el('input', {name: 'path', type: 'text',
    placeholder: 'e.g. /ollama'});
  const portInput = el('input', {name: 'local_port', type: 'number',
    min: '1', max: '65535', placeholder: 'e.g. 5432'});
  const pathLabel = el('label', {style: 'display:none'}, 'Path (local mount)', pathInput);
  const portLabel = el('label', {style: 'display:none'}, 'Port (localhost)', portInput);
  // Session TTL — per-mount override of cloudbox's absolute-expiry cap on
  // the matrix_elev cookie. Default leaves the cloud policy alone; Custom
  // takes a number of seconds (revealed only when picked). The "infinite"
  // option uses Number.MAX_SAFE_INTEGER as the wire value; see TTL_INFINITE
  // for why we don't ship math.MaxInt64.
  const ttlSel = el('select', {name: 'ttl'},
    el('option', {value: '0'}, 'Default (cloud policy)'),
    el('option', {value: '3600'}, '1 hour'),
    el('option', {value: '28800'}, '8 hours'),
    el('option', {value: '86400'}, '24 hours'),
    el('option', {value: '604800'}, '1 week'),
    el('option', {value: String(TTL_INFINITE)}, 'Infinite (no cap)'),
    el('option', {value: 'custom'}, 'Custom (seconds)…'),
  );
  const ttlCustom = el('input', {name: 'ttl_custom', type: 'number',
    min: '1', placeholder: 'seconds', style: 'display:none; margin-top:0.3rem'});
  ttlSel.addEventListener('change', () => {
    ttlCustom.style.display = ttlSel.value === 'custom' ? '' : 'none';
  });
  const ttlLabel = el('label', {}, 'Session TTL', ttlSel, ttlCustom);
  // Status hint that shows the auto-filled host/user for the currently
  // picked remote, so the operator can confirm what they're connecting
  // to without us re-displaying it as raw input fields.
  const remoteHint = el('div', {class: 'hint', style: 'margin-top:-0.3rem; min-height:1em;'}, '');
  const applyRemote = () => {
    const opt = remoteSel.selectedOptions[0];
    const scheme = (opt && opt.dataset.scheme) || '';
    const isListener = scheme === 'tcp' || scheme === 'ssh';
    pathLabel.style.display = scheme === 'http' ? '' : 'none';
    portLabel.style.display = isListener ? '' : 'none';
    pathInput.required = scheme === 'http';
    portInput.required = isListener;
    remoteHint.textContent = (opt && opt.dataset.host)
      ? `${opt.dataset.host} · ${opt.dataset.user || '(no os user)'} · ${scheme}`
      : '';
  };
  remoteSel.addEventListener('change', applyRemote);

  addOb.append(
    el('label', {}, 'Remote', remoteSel),
    remoteHint,
    pathLabel,
    portLabel,
    ttlLabel,
    el('button', {type: 'submit', style: 'align-self: start; margin-top: 0.3rem;'}, 'Save'));

  // Kick off the fetch after the form is in the DOM so the user sees
  // the placeholder option immediately. The result populates the
  // dropdown in place.
  (async () => {
    try {
      const r = await api('GET', '/api/outbound/suggestions');
      const list = (r && r.suggestions) || [];
      remoteSel.innerHTML = '';
      if (list.length === 0) {
        remoteSel.append(el('option', {value: ''}, '(no remote apps available)'));
        applyRemote();
        return;
      }
      // Empty placeholder first so the user has to make a deliberate
      // choice rather than silently inheriting the first row.
      remoteSel.append(el('option', {value: ''}, '— pick a remote —'));
      for (const s of list) {
        // SSH-builtin suggestions ship with name="" — render them as
        // "host / built-in ssh (ssh)" so the dropdown reads sensibly.
        const isSSHBuiltin = s.scheme === 'ssh';
        const displayName = isSSHBuiltin ? 'built-in ssh' : s.name;
        const label = `${s.host} / ${displayName} (${s.scheme || 'http'})`
          + (s.require_login ? ' 🔒' : '')
          + (s.online ? '' : ' — offline')
          + (s.shared ? ' — shared' : '');
        const opt = el('option',
          {value: `${s.host}/${isSSHBuiltin ? '__ssh__' : s.name}`}, label);
        opt.dataset.host = s.host;
        opt.dataset.name = s.name; // empty for ssh-builtin; submit handler keys off scheme
        opt.dataset.user = s.os_user || '';
        opt.dataset.scheme = s.scheme || 'http';
        opt.dataset.indexPath = s.index_path || '';
        remoteSel.append(opt);
      }
      applyRemote();
    } catch (e) {
      remoteSel.innerHTML = '';
      remoteSel.append(el('option', {value: ''}, '— failed to load remotes —'));
      msg('err', 'Could not load remote apps: ' + (e.message || e));
    }
  })();

  addOb.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const opt = remoteSel.selectedOptions[0];
    if (!opt || !opt.dataset.host) {
      msg('err', 'Pick a remote to mount.');
      return;
    }
    const scheme = opt.dataset.scheme || 'http';
    const host = opt.dataset.host;
    const name = opt.dataset.name;
    const user = opt.dataset.user;
    const body = { host, name, user, scheme };
    if (scheme === 'tcp' || scheme === 'ssh') {
      const port = parseInt(portInput.value, 10);
      if (!Number.isFinite(port) || port < 1 || port > 65535) {
        msg('err', 'Port must be between 1 and 65535');
        return;
      }
      body.local_port = port;
      // Synthesize a path identifier: <host>-<name>-<port> for tcp, or
      // <host>-ssh-<port> for the built-in ssh mount (no app name).
      body.path = scheme === 'ssh'
        ? `${host}-ssh-${port}`
        : `${name}-${port}`;
    } else {
      // Accept "/ollama" or "ollama"; server requires a slash-free path,
      // so strip a leading slash here.
      body.path = pathInput.value.replace(/^\/+/, '').trim();
      if (!body.path) {
        msg('err', 'Path is required.');
        return;
      }
    }
    // Resolve the TTL selector → ttl_seconds. 0 (Default) is omitted from
    // the body so the server falls back to cloudbox's policy default.
    let ttl = 0;
    if (ttlSel.value === 'custom') {
      ttl = parseInt(ttlCustom.value, 10);
      if (!Number.isFinite(ttl) || ttl < 1) {
        msg('err', 'Custom TTL must be a positive number of seconds.');
        return;
      }
    } else {
      ttl = parseInt(ttlSel.value, 10) || 0;
    }
    if (ttl > 0) body.ttl_seconds = ttl;
    try {
      await api('POST', '/api/outbound', body);
      msg('ok', 'Outbound added.');
      render();
    } catch (e) {
      msg('err', e.message || 'Add failed');
    }
  });
  // Drawer toggled by the + Add outbound legend-action. Same
  // pattern as Custom apps: hidden by default, opens inline
  // between the legend and the list of existing mounts.
  const addObDrawer = el('div', {class: 'add-drawer hidden'});
  addObDrawer.append(addOb);
  outboundAddBtn.addEventListener('click', () => {
    const wasHidden = addObDrawer.classList.contains('hidden');
    addObDrawer.classList.toggle('hidden');
    outboundAddBtn.classList.toggle('open', wasHidden);
    outboundAddBtn.textContent = wasHidden ? '− Close' : '+ Add outbound';
    if (wasHidden) setTimeout(() => remoteSel.focus(), 0);
  });

  outbound.append(addObDrawer, obList);
  panelOutbound.append(outbound);

  // Update panel content. Loaded async (fetches /api/upgrade); the
  // tab itself is interactive immediately because the panel renders
  // inline with the others. Each Apply / Rollback action re-renders
  // this panel after a short delay so the operator sees fresh state.
  buildUpdateSection(panelUpdate);

  // Header actions (Restart / Sign out) — primary blue, right-aligned in
  // the page header.
  const ha = $('#header-actions');
  ha.innerHTML = '';
  ha.append(
    el('button', {onclick: async () => {
      try { await api('POST', '/api/restart'); restartNeeded = false; msg('ok', 'Restarting…'); pollUntilUp(); }
      catch (e) { msg('err', e.message); }
    }}, 'Restart outpost'),
    el('button', {onclick: async () => {
      try { await api('POST', '/api/logout'); render(); }
      catch (e) { msg('err', e.message); }
    }}, 'Sign out'),
  );
}

async function pollUntilUp() {
  // The restart is debounced ~1s on the server side, so the very
  // first /healthz hit after a save will catch the OLD process and
  // wrongly declare "up". We instead wait for /healthz to FAIL at
  // least once (process re-execing, listener torn down) and only then
  // start treating successful hits as the new process being ready.
  // Falls back to a fixed delay if the old process never appears to
  // go down within ~3s (e.g. very fast re-exec on a quiet box).
  let sawDown = false;
  for (let i = 0; i < 8 && !sawDown; i++) {
    await new Promise(r => setTimeout(r, 250));
    try {
      const r = await fetch('/healthz', { cache: 'no-store' });
      if (!r.ok) sawDown = true;
    } catch (_) { sawDown = true; }
  }
  // Now poll for the new process to bind.
  for (let i = 0; i < 60; i++) {
    await new Promise(r => setTimeout(r, 500));
    try {
      const r = await fetch('/healthz', { cache: 'no-store' });
      if (r.ok) {
        // Give the API routes a beat to bind too, then reload.
        setTimeout(() => render(), 250);
        return;
      }
    } catch (_) {}
  }
  msg('err', 'Outpost did not come back. Check the logs.');
}

// One-shot decoration: drop the coin into the page header next to the
// title. Runs on script load so it persists across render() rebuilds
// (the header lives outside #app).
(() => {
  const h1 = document.querySelector('header.app-header h1');
  if (h1 && !h1.querySelector('svg')) {
    h1.prepend(coinLogo(28));
  }
})();

render();
</script>
</body>
</html>
